<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLGS Content Hub - Pro Editor</title>
    <style>
        :root {
            --pro-blue: #0056b3;
            --pro-blue-hover: #004494;
            --pro-green: #28a745;
            --pro-green-hover: #218838;
            --bg-light: #f8f9fa;
            --border-color: #dee2e6;
            --text-main: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header & Controls */
        header {
            background: white;
            padding: 15px 25px;
            border-bottom: 2px solid var(--pro-blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 {
            margin: 0 0 15px 0;
            color: var(--pro-blue);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .top-row {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }

        .subject-container {
            flex-grow: 1;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            color: var(--pro-blue);
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .timestamp-box {
            background: #e9ecef;
            padding: 10px 15px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            color: #495057;
            border: 1px solid var(--border-color);
            min-width: 250px;
            text-align: center;
        }

        /* Toolbar Buttons */
        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn-green { background-color: var(--pro-green); color: white; }
        .btn-green:hover { background-color: var(--pro-green-hover); }

        .btn-blue { background-color: var(--pro-blue); color: white; }
        .btn-blue:hover { background-color: var(--pro-blue-hover); }

        .btn-copy { background-color: #6c757d; color: white; }
        .btn-copy:hover { background-color: #5a6268; }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 15px;
            gap: 15px;
        }

        .pane {
            display: flex;
            flex-direction: column;
            flex: 1;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .pane-header {
            background: #f1f3f5;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        textarea {
            flex: 1;
            padding: 15px;
            border: none;
            resize: none;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            outline: none;
            background: #fafafa;
        }

        iframe {
            flex: 1;
            border: none;
            background: white;
        }

        /* Hidden file input */
        #file-input { display: none; }
    </style>
</head>
<body>

<header>
    <h1>MLGS Content Hub</h1>
    
    <div class="top-row">
        <div class="subject-container">
            <label for="email-title">Subject Line / Title</label>
            <input type="text" id="email-title" placeholder="Enter email subject here...">
        </div>
        <div class="timestamp-box" id="timestamp">
            LAST SAVED: NEVER
        </div>
    </div>

    <div class="toolbar">
        <button class="btn btn-green" onclick="saveContent()">Save to PC & Log</button>
        <button class="btn btn-blue" onclick="document.getElementById('file-input').click()">Load Last File</button>
        <button class="btn btn-copy" onclick="copyHTML()">Copy HTML Code</button>
        <a href="https://www.myleadgenserect.com/login" target="_blank" class="btn btn-green">Open MLGS Login</a>
        <button class="btn btn-blue" onclick="clearWorkspace()">New Template</button>
    </div>
    <input type="file" id="file-input" accept=".html,.txt">
</header>

<main class="workspace">
    <!-- Left Side: Editor -->
    <div class="pane">
        <div class="pane-header">HTML Editor</div>
        <textarea id="email-body" placeholder="Paste or type your HTML here..." oninput="updatePreview()"></textarea>
    </div>

    <!-- Right Side: Live Preview -->
    <div class="pane">
        <div class="pane-header">Live Preview</div>
        <iframe id="preview-frame"></iframe>
    </div>
</main>

<script>
    const editor = document.getElementById('email-body');
    const titleInput = document.getElementById('email-title');
    const previewFrame = document.getElementById('preview-frame');
    const timestampDisplay = document.getElementById('timestamp');
    const fileInput = document.getElementById('file-input');

    // 1. Live Preview Logic
    function updatePreview() {
        const content = editor.value;
        const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        doc.open();
        doc.write(content);
        doc.close();
        
        // Auto-save to LocalStorage for persistence
        persistData();
    }

    // 2. Local Storage Persistence
    function persistData() {
        localStorage.setItem('mlgs_saved_body', editor.value);
        localStorage.setItem('mlgs_saved_title', titleInput.value);
    }

    function loadPersistedData() {
        const savedBody = localStorage.getItem('mlgs_saved_body');
        const savedTitle = localStorage.getItem('mlgs_saved_title');
        const savedTime = localStorage.getItem('mlgs_saved_time');

        if (savedBody) editor.value = savedBody;
        if (savedTitle) titleInput.value = savedTitle;
        if (savedTime) timestampDisplay.innerText = `LAST SAVED: ${savedTime}`;
        
        updatePreview();
    }

    // 3. Save to PC (.html file)
    function saveContent() {
        const htmlContent = editor.value;
        const title = titleInput.value || "mlgs-content";
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const a = document.createElement('a');
        
        const now = new Date().toLocaleString();
        
        a.href = URL.createObjectURL(blob);
        a.download = `${title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.html`;
        a.click();

        // Update UI and Storage
        timestampDisplay.innerText = `LAST SAVED: ${now}`;
        localStorage.setItem('mlgs_saved_time', now);
        persistData();
        
        alert("File downloaded and session logged.");
    }

    // 4. Load from PC
    fileInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = event => {
            const content = event.target.result;
            editor.value = content;
            // Set title to filename without extension
            titleInput.value = file.name.replace(/\.[^/.]+$/, "");
            updatePreview();
        };
        reader.readAsText(file);
    };

    // 5. Copy to Clipboard
    function copyHTML() {
        editor.select();
        navigator.clipboard.writeText(editor.value).then(() => {
            const originalText = document.querySelector('.btn-copy').innerText;
            document.querySelector('.btn-copy').innerText = "COPIED!";
            setTimeout(() => {
                document.querySelector('.btn-copy').innerText = originalText;
            }, 2000);
        });
    }

    // 6. Clear Workspace
    function clearWorkspace() {
        if(confirm("Are you sure you want to clear the editor?")) {
            editor.value = "";
            titleInput.value = "";
            updatePreview();
        }
    }

    // Initialize on Load
    window.onload = loadPersistedData;

    // Handle Title changes for auto-save
    titleInput.addEventListener('input', persistData);

</script>

</body>
</html>
