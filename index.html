<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Email Swipe Machine</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --bg: #d4c4a8; --panel: #f5f0e6; --panel2: #efe6d8; --border: #c9b896;
            --muted: #5c4d3a; --gold: #b8860b; --green: #2e7d32; --blue: #1976d2; --red: #d32f2f;
            --shadow: 0 4px 0px rgba(0,0,0,0.2);
            --btn-h: 40px;
        }
        body.theme-slate {
            --bg: #111827; --panel: #1f2937; --panel2: #243244; --border: #374151;
            --muted: #cbd5e1; --gold: #fbbf24; --green: #22c55e; --red: #ef4444;
        }
        * { box-sizing: border-box; font-size: 16px; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: #111; line-height: 1.6; }
        
        .topbar { background: var(--panel); border-bottom: 3px solid var(--gold); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 240px 1fr 1fr; gap: 16px; padding: 16px; transition: all 0.3s ease; }
        .grid.sidebar-closed { grid-template-columns: 60px 1fr 1fr; }
        
        .card { background: var(--panel); border: 2px solid var(--border); border-radius: 10px; padding: 16px; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .sidebar-content { transition: opacity 0.2s; }
        .sidebar-closed .sidebar-content { opacity: 0; visibility: hidden; height: 0; overflow: hidden; }
        
        .btn {
            border: 2px solid rgba(0,0,0,0.1); background: var(--panel2); color: #111;
            height: var(--btn-h); padding: 0 15px; border-radius: 8px; cursor: pointer;
            font-weight: 800; display: inline-flex; align-items: center; justify-content: center;
            white-space: nowrap; transition: all 0.1s ease;
            box-shadow: var(--shadow); position: relative; top: 0;
        }
        .btn:hover { filter: brightness(1.05); top: -2px; box-shadow: 0 6px 0px rgba(0,0,0,0.15); }
        .btn:active { top: 3px; box-shadow: 0 1px 0px rgba(0,0,0,0.1); transform: scale(0.98); }
        
        .btnGreen { background: var(--green); color: #fff; }
        .btnBlue { background: var(--blue); color: #fff; }
        .btnRed { background: var(--red); color: #fff; }
        .btnIcon { padding: 0 10px; font-size: 18px; }
        .btnSmall { height: 32px; font-size: 13px; }
        
        input, textarea { width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px; margin-bottom: 12px; background: #fff; color: #000; }
        select { 
            width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px; 
            margin-bottom: 12px; background: #fff !important; color: #000 !important; font-weight: bold;
            appearance: auto !important; cursor: pointer;
        }

        .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; background: var(--panel2); padding: 8px; border: 2px solid var(--border); border-bottom: 0; border-radius: 8px 8px 0 0; }
        .toolbar-bottom { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; background: var(--panel2); padding: 8px; border: 2px solid var(--border); border-top: 0; border-radius: 0 0 8px 8px; }

        #bodyEditor, #sourceEditor { width: 100%; max-width: 600px; min-height: 450px; background: #fff; color: #000; border: 2px solid var(--border); padding: 15px; outline: none; margin: 0 auto; overflow-y: auto; }
        #sourceEditor { display: none; font-family: monospace; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modalInner { background: var(--panel); border: 4px solid var(--gold); border-radius: 12px; padding: 25px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); overflow-y: auto; max-height: 90vh; }
        
        .preview-body-frame { background: #fff; border: 2px solid var(--border); padding: 25px; min-height: 450px; max-width: 600px; margin: 0 auto; color: #000; }
        .preview-subject-box { background: #fff; border: 2px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 20px; min-height: 50px; color: #000; }
        .mlgs-label { font-weight: 900; font-size: 12px; color: #fff; background: var(--gold); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
        
        /* New AI/GitHub Styles */
        .gen-preview { width: 100%; border: 2px solid var(--gold); border-radius: 8px; margin: 10px 0; display: none; }
        .loading-bar { height: 4px; background: var(--gold); width: 0%; transition: width 0.3s; margin-top: 5px; }
    </style>
</head>
<body>

<div id="toast" style="position:fixed; bottom:20px; right:20px; background:#333; color:#fff; padding:12px 24px; display:none; border-radius:8px; z-index:99999; font-weight:bold;"></div>

<div class="modal" id="apiModal"><div class="modalInner">
    <h2 style="color:var(--gold); margin-top:0;">API Keys</h2>
    <label style="font-size:11px; font-weight:800;">GROQ KEY</label>
    <input id="apiKey" type="password" placeholder="Groq Key...">
    <label style="font-size:11px; font-weight:800;">HUGGING FACE TOKEN</label>
    <input id="hfKey" type="password" placeholder="HF Token...">
    <label style="font-size:11px; font-weight:800;">GITHUB TOKEN (for image hosting)</label>
    <input id="ghKey" type="password" placeholder="ghp_xxxxxxxxxxxx">
    <button class="btn btnGreen" style="width:100%" onclick="saveKeys()">Save Keys</button>
    <button class="btn" style="width:100%; margin-top:10px;" onclick="$('apiModal').classList.remove('show')">Cancel</button>
</div></div>

<div class="modal" id="imgMgrModal">
    <div class="modalInner">
        <h2 style="color:var(--gold); margin-top:0;">Image & AI Lab</h2>
        
        <div style="background:var(--panel2); padding:12px; border-radius:8px; border:1px solid var(--border); margin-bottom:15px;">
            <label style="font-size:11px; font-weight:800;">1. AI IMAGE GENERATOR</label>
            <textarea id="aiImgPrompt" placeholder="A futuristic car in the desert, photorealistic..." style="min-height:60px; margin-bottom:8px;"></textarea>
            <button class="btn btnBlue btnSmall" style="width:100%" onclick="generateAIImage()">Create Image</button>
            <div id="genPreviewContainer">
                <img id="genPreviewImg" class="gen-preview">
                <div id="genStatus" style="font-size:11px; font-weight:bold; margin-top:5px;"></div>
                <div class="loading-bar" id="genBar"></div>
            </div>
            <div id="hostControls" style="display:none; margin-top:10px; gap:5px; flex-direction:column;">
                <input id="genFileName" placeholder="filename.png (optional)">
                <button class="btn btnGreen" style="width:100%" onclick="hostToGitHub()">Host to GitHub & Add to Gallery</button>
            </div>
        </div>

        <label style="font-size:11px; font-weight:800;">2. GLOBAL AUTO-LINK</label>
        <input id="globalImgLink" placeholder="https://your-main-offer.com" oninput="saveGlobalLink()">
        
        <label style="font-size:11px; font-weight:800;">3. GALLERY LIST</label>
        <div id="imgList" style="max-height:150px; overflow-y:auto; margin:10px 0; border:2px solid var(--border); background:#fff; padding:5px; color:#000;"></div>
        
        <label style="font-size:11px; font-weight:800;">MANUAL ADD</label>
        <input id="imgNewName" placeholder="Label">
        <input id="imgNewUrl" placeholder="Image URL...">
        <button class="btn btnGreen" style="width:100%" onclick="addImgToGallery()">Add to Gallery</button>
        <button class="btn" style="width:100%; margin-top:10px;" onclick="$('imgMgrModal').classList.remove('show')">Close</button>
    </div>
</div>

<div class="modal" id="settingsModal"><div class="modalInner">
    <h2 style="color:var(--gold); margin-top:0;">UI Settings</h2>
    <button class="btn btnBlue" style="width:100%;" onclick="document.body.classList.toggle('theme-slate')">Toggle Dark/Light Mode</button>
    <button class="btn" style="width:100%; margin-top:15px;" onclick="$('settingsModal').classList.remove('show')">Close</button>
</div></div>

<div class="modal" id="errorModal"><div class="modalInner">
    <h2 style="color:var(--red); margin-top:0;">🐞 Debug Log</h2>
    <div id="apiErrorLog" style="font-size:12px; background:#fff; border:2px solid var(--border); padding:12px; min-height:150px; margin-bottom:15px; color:#d32f2f; white-space:pre-wrap; overflow-y:auto; max-height:300px; font-family:monospace;">No errors recorded.</div>
    <button class="btn btnBlue" style="width:100%" onclick="$('errorModal').classList.remove('show')">Close Log</button>
</div></div>

<div class="modal" id="promptModal"><div class="modalInner">
    <h2 id="promptTitle" style="color:var(--gold); margin-top:0;">Edit Prompt</h2>
    <textarea id="promptArea" style="min-height:200px;" oninput="savePromptLive()"></textarea>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn btnGreen" style="flex:1" onclick="closePrompt(true)">Save Changes</button>
        <button class="btn btnRed" style="flex:1" onclick="closePrompt(false)">Cancel</button>
    </div>
</div></div>

<div class="modal" id="sigMgrModal">
    <div class="modalInner">
        <h2 style="color:var(--gold); margin-top:0;">Manage Signatures</h2>
        <div id="sigList" style="max-height:150px; overflow-y:auto; margin:10px 0; border:2px solid var(--border); background:#fff; padding:5px; color:#000;"></div>
        <label style="font-size:11px; font-weight:800;">ADD NEW SIGNATURE</label>
        <input id="sigNewName" placeholder="Label">
        <textarea id="sigNewHTML" placeholder="Paste HTML..." style="min-height:100px;"></textarea>
        <button class="btn btnGreen" style="width:100%" onclick="addSig()">Save Signature</button>
        <button class="btn" style="width:100%; margin-top:10px;" onclick="$('sigMgrModal').classList.remove('show')">Close</button>
    </div>
</div>

<div class="topbar">
    <div style="font-weight:900; color:var(--gold); font-size:24px;">Email Swipe Machine</div>
    <div style="display:flex; gap:12px;">
        <button class="btn btnRed btnSmall" onclick="$('errorModal').classList.add('show')">🐞 Debug</button>
        <button class="btn btnSmall" onclick="$('apiModal').classList.add('show')">🔑 API Keys</button>
        <button class="btn btnBlue btnSmall" onclick="toggleSource()" id="srcBtn">HTML Source</button>
    </div>
</div>

<div class="grid" id="mainGrid">
    <div class="card" style="padding: 10px;">
        <button class="btn btnSmall btnBlue" style="width:100%; margin-bottom:15px;" onclick="toggleSidebar()" id="tglBtn">HIDE SIDEBAR</button>
        <div class="sidebar-content">
            <label style="font-weight:800; font-size:12px; color:var(--muted)">OFFER NAME</label>
            <input id="offerName" type="text" oninput="autoSave()">
            <label style="font-weight:800; font-size:12px; color:var(--muted)">BENEFITS</label>
            <textarea id="benefits" style="min-height:100px;" oninput="autoSave()"></textarea>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn btnBlue" onclick="openPrompt('title')">Edit Title Prompt</button>
                <button class="btn btnBlue" onclick="openPrompt('body')">Edit Body Prompt</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; gap:10px; margin-bottom:12px;">
            <input id="subject" type="text" placeholder="Enter Subject Line..." style="margin:0; flex:1; font-weight:bold; color:#000;" oninput="update(); autoSave();">
            <button class="btn btnGreen" onclick="generateFullSwipe()">🔥 AI GENERATE</button>
        </div>

        <div class="toolbar">
            <button class="btn btnIcon btnSmall" onclick="exec('bold')"><b>B</b></button>
            <button class="btn btnIcon btnSmall" onclick="exec('italic')"><i>I</i></button>
            <button class="btn btnIcon btnSmall" onclick="exec('foreColor','#d32f2f')" style="color:#d32f2f">A</button>
            <button class="btn btnIcon btnSmall" onclick="exec('foreColor','#111111')">A</button>
            <button class="btn btnSmall" onclick="exec('createLink', prompt('Link URL:'))">Link</button>
            <span style="border-left:2px solid var(--border); margin:0 4px; height:24px;"></span>
            <select id="imgGallerySelect" style="width:110px; margin:0; font-size:12px; height:32px;"><option value="">Gallery...</option></select>
            <button class="btn btnBlue btnSmall" onclick="insertGalleryImg()">Insert</button>
            <button class="btn btnSmall" onclick="$('imgMgrModal').classList.add('show')">🖼️</button>
        </div>

        <div id="bodyEditor" contenteditable="true" oninput="update(); autoSave();"></div>
        <textarea id="sourceEditor"></textarea>

        <div class="toolbar-bottom">
            <button class="btn btnSmall" onclick="exec('undo')">Undo Move</button>
            <span style="border-left:2px solid var(--border); margin:0 4px; height:24px;"></span>
            <select id="sigSelect" style="width:140px; margin:0; font-size:12px; height:32px;"><option value="">Signatures</option></select>
            <button class="btn btnBlue btnSmall" onclick="insertSig()">Insert Sig</button>
            <button class="btn btnSmall" onclick="$('sigMgrModal').classList.add('show')">Manage</button>
            <div style="flex:1"></div>
            <button class="btn btnRed btnSmall" onclick="clearBody()">Clear Editor</button>
        </div>
    </div>

    <div class="card">
        <div class="mlgs-label">MYLEADGENSECRET PREVIEW</div>
        <div class="preview-subject-box">
            <label style="font-weight:800; font-size:10px; color:var(--muted); display:block; margin-bottom:4px;">SUBJECT LINE</label>
            <span id="prevSub" style="font-weight:800; color:#000;"></span>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn btnBlue" style="flex:1" onclick="copyText($('subject').value)">Copy Title</button>
            <button class="btn btnBlue" style="flex:1" onclick="copyText(getWrappedBody())">Copy HTML</button>
        </div>
        <div class="preview-body-frame" id="prevBody"></div>
        <div style="margin-top:15px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:800; font-size:13px; margin-bottom:15px;">
                <input type="checkbox" id="useWrapper" checked style="width:auto; margin:0; transform: scale(1.2);" onchange="update()"> Use 600px Wrapper
            </label>
            <button class="btn btnGreen" onclick="copyAll()" style="width:100%; height:70px; font-size:22px;">COPY FULL SWIPE</button>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);
    let activePrompt = "";
    let promptTitle = localStorage.getItem("esm_prompt_title") || "Return ONLY one string. Vibe: High-energy, sarcastic funny humor. Logic: Pick ONE scenario (Pajamas, No Traffic, Beach, Naps, or Home) and use it for BOTH. Brag about the lifestyle, mock the office grind. Rules: BANNED WORDS: ditch, escape, freedom, wealth, massive, system, financial, boss. Title format: Start with ⭐, 7-9 words.";
    let promptBody  = localStorage.getItem("esm_prompt_body")  || "Write exactly 3 sentences max, start with ⭐. Vibe: High-energy, sarcastic humor. Brag about the lifestyle. BANNED: ditch, escape, freedom, wealth, massive, system, financial, boss.";
    let savedRange = null;
    let currentBlob = null; // Stores generated image

    function showToast(m) { const t=$("toast"); t.textContent=m; t.style.display="block"; setTimeout(()=>t.style.display="none",2500); }
    function logErr(msg) { $("apiErrorLog").textContent += `\n[${new Date().toLocaleTimeString()}] ${msg}`; }
    
    function saveKeys() { 
        localStorage.setItem("esm_key", $("apiKey").value); 
        localStorage.setItem("esm_hf_key", $("hfKey").value); 
        localStorage.setItem("esm_gh_key", $("ghKey").value); 
        $("apiModal").classList.remove("show"); showToast("Keys Saved"); 
    }

   // AI IMAGE GENERATION - Dezgo Stable Version (No Key)
    async function generateAIImage() {
        const promptText = $("aiImgPrompt").value;
        if(!promptText) return showToast("Please enter a prompt first");
        
        $("genBar").style.width = "30%";
        $("genStatus").textContent = "Waking up the engine...";
        $("genPreviewImg").style.display = "none";
        
        // Dezgo's 2026 Public API - Stable & Fast
        // No key required for standard 768x768 generations
        const apiUrl = "https://api.dezgo.com/v1/text-to-image"; 
        
        try {
            // We use a clean POST request to ensure we don't get cached "Busy" errors
            const response = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(`https://image.pollinations.ai/prompt/${encodeURIComponent(promptText)}?width=768&height=768&nologo=true&seed=${Math.floor(Math.random()*999999)}`));

            if (!response.ok) {
                 // Final Fallback to a secondary mirror if the primary is slow
                 throw new Error("Primary line busy");
            }

            currentBlob = await response.blob();
            const localUrl = URL.createObjectURL(currentBlob);
            
            $("genPreviewImg").src = localUrl;
            $("genPreviewImg").style.display = "block";
            $("genBar").style.width = "100%";
            $("genStatus").textContent = "Done! Image looks great.";
            $("hostControls").style.display = "flex";
            
        } catch (e) {
            logErr("Service Note: " + e.message);
            // If the script fails, we give you a direct manual link so you aren't stuck
            const manualLink = `https://image.pollinations.ai/prompt/${encodeURIComponent(promptText)}?width=768&height=768&nologo=true`;
            $("genStatus").innerHTML = `<a href="${manualLink}" target="_blank" style="color:var(--gold)">Click here to view image manually</a>`;
            showToast("Service busy. Use the manual link above.");
            $("genBar").style.width = "0%";
        }
    }
    // GITHUB HOSTING
    async function hostToGitHub() {
        const ghKey = localStorage.getItem("esm_gh_key");
        if(!ghKey || !currentBlob) return showToast("GitHub Token Missing");

        $("genStatus").textContent = "Uploading to GitHub...";
        const reader = new FileReader();
        reader.readAsDataURL(currentBlob);
        reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1];
            const fileName = ($("genFileName").value || `img_${Date.now()}`).replace('.png','') + ".png";
            const repo = "troypringle/images"; // Your specific repo
            
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${ghKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `Upload ${fileName} via Machine`,
                        content: base64Data
                    })
                });

                if(!res.ok) throw new Error(await res.text());
                
                const rawUrl = `https://raw.githubusercontent.com/${repo}/main/${fileName}`;
                
                // Add to gallery automatically
                gallery.push({ name: fileName, url: rawUrl, link: localStorage.getItem("esm_global_link") || "" });
                localStorage.setItem("esm_gallery", JSON.stringify(gallery));
                renderGallery();
                
                showToast("Hosted Successfully!");
                $("genStatus").textContent = "Done! Linked in Gallery.";
                $("hostControls").style.display = "none";
            } catch (e) {
                logErr("GitHub Upload Error: " + e.message);
                showToast("GitHub Failed - Check Debug");
            }
        };
    }

    // Existing functions (Modified selection to keep original behavior)
    function toggleSidebar() { $("mainGrid").classList.toggle("sidebar-closed"); $("tglBtn").textContent = $("mainGrid").classList.contains("sidebar-closed") ? "SHOW" : "HIDE"; }
    $("bodyEditor").addEventListener('focus', () => { document.execCommand('defaultParagraphSeparator', false, 'div'); });
    $("bodyEditor").addEventListener('blur', () => { const sel = window.getSelection(); if (sel.rangeCount > 0) savedRange = sel.getRangeAt(0); });
    function restoreSelection() { if (savedRange) { const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange); } else { $("bodyEditor").focus(); } }

    async function callAI(p) {
        const groqKey = localStorage.getItem("esm_key");
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method:"POST", headers:{"Authorization":`Bearer ${groqKey}`,"Content-Type":"application/json"},
                body: JSON.stringify({model:"llama-3.3-70b-versatile", messages:[{role:"user",content:p}]})
            });
            const d = await res.json(); return d.choices[0].message.content.trim();
        } catch(e) { logErr("Groq Error: " + e.message); return null; }
    }

    async function generateFullSwipe() {
        showToast("Generating AI Swipe...");
        const masterPrompt = `Return ONLY a JSON object with keys "title" and "body". TITLE LOGIC: ${promptTitle} BODY LOGIC: ${promptBody} Offer: ${$("offerName").value} Benefits: ${$("benefits").value}`;
        const res = await callAI(masterPrompt);
        if(res) {
            try {
                const cleanRes = res.replace(/```json|```/g, "").trim();
                const data = JSON.parse(cleanRes);
                $("subject").value = data.title.replace(/"/g,'');
                restoreSelection();
                const bodyHtml = data.body.split('\n').filter(l => l.trim()).map(l => `<div>${l}</div>`).join('') + `<div><br></div>`;
                document.execCommand('insertHTML', false, bodyHtml);
                update(); autoSave(); showToast("Success! ✅");
            } catch(e) { logErr("Parse Error: " + e.message); }
        }
    }

    function openPrompt(type) { activePrompt = type; $("promptTitle").textContent = `Editing ${type.toUpperCase()} Prompt`; $("promptArea").value = type === 'title' ? promptTitle : promptBody; $("promptModal").classList.add("show"); }
    function savePromptLive() { const v = $("promptArea").value; if (activePrompt === "title") { promptTitle = v; localStorage.setItem("esm_prompt_title", v); } else { promptBody = v; localStorage.setItem("esm_prompt_body", v); } }
    function closePrompt(save) { $("promptModal").classList.remove("show"); activePrompt = ""; }
    function exec(c, v=null) { $("bodyEditor").focus(); document.execCommand(c, false, v); update(); }
    function toggleSource() {
        const isSrc = $("sourceEditor").style.display === "block";
        if(isSrc) { $("bodyEditor").innerHTML = $("sourceEditor").value; $("sourceEditor").style.display = "none"; $("bodyEditor").style.display = "block"; $("srcBtn").textContent = "HTML Source"; }
        else { $("sourceEditor").value = $("bodyEditor").innerHTML; $("bodyEditor").style.display = "none"; $("sourceEditor").style.display = "block"; $("srcBtn").textContent = "Visual Editor"; }
    }
    function update() { $("prevSub").textContent = $("subject").value; $("prevBody").innerHTML = $("bodyEditor").innerHTML; }
    function getWrappedBody() { const content = $("bodyEditor").innerHTML; if(!$("useWrapper").checked) return content; return `<table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width:600px; margin:0 auto;"><tr><td style="font-family:Arial, sans-serif; font-size:16px; line-height:1.6; color:#111111;">${content}</td></tr></table>`; }
    function autoSave() { const data = { sub: $("subject").value, body: $("bodyEditor").innerHTML, offer: $("offerName").value, benefits: $("benefits").value }; localStorage.setItem("esm_draft", JSON.stringify(data)); }
    function loadDraft() { 
        const d = JSON.parse(localStorage.getItem("esm_draft")); 
        if(d) { $("subject").value = d.sub || ""; $("bodyEditor").innerHTML = d.body || ""; $("offerName").value = d.offer || ""; $("benefits").value = d.benefits || ""; update(); } 
        $("apiKey").value = localStorage.getItem("esm_key") || "";
        $("hfKey").value = localStorage.getItem("esm_hf_key") || "";
        $("ghKey").value = localStorage.getItem("esm_gh_key") || "";
    }
    function renderSigs() {
        const select = $("sigSelect"); if(select) select.innerHTML = '<option value="">Signatures</option>' + signatures.map((sig, i) => `<option value="${i}">${sig.name}</option>`).join('');
        $("sigList").innerHTML = signatures.map((sig, i) => `<div style="display:flex; justify-content:space-between; padding:5px; background:#fff; margin-bottom:2px; color:#000;"><span>${sig.name}</span><button onclick="delSig(${i})">X</button></div>`).join('');
    }
    function addSig() { signatures.push({ name: $("sigNewName").value, html: $("sigNewHTML").value }); localStorage.setItem("esm_signatures", JSON.stringify(signatures)); renderSigs(); showToast("Added!"); }
    window.delSig = function(i) { signatures.splice(i, 1); localStorage.setItem("esm_signatures", JSON.stringify(signatures)); renderSigs(); };
    function insertSig() { restoreSelection(); const idx = $("sigSelect").value; if(idx !== "") { document.execCommand('insertHTML', false, "<div><br>" + signatures[idx].html + "</div>"); update(); } }
    function renderGallery() {
        const select = $("imgGallerySelect"); if(select) select.innerHTML = '<option value="">Gallery...</option>' + gallery.map((img, i) => `<option value="${i}">${img.name}</option>`).join('');
        $("imgList").innerHTML = gallery.map((img, i) => `<div style="display:flex; justify-content:space-between; padding:5px; background:#fff; margin-bottom:2px; color:#000;"><span>${img.name}</span><button onclick="delImg(${i})">X</button></div>`).join('');
    }
    function addImgToGallery() { gallery.push({ name: $("imgNewName").value, url: $("imgNewUrl").value, link: localStorage.getItem("esm_global_link") || "" }); localStorage.setItem("esm_gallery", JSON.stringify(gallery)); renderGallery(); }
    window.delImg = function(i) { gallery.splice(i, 1); localStorage.setItem("esm_gallery", JSON.stringify(gallery)); renderGallery(); };
    function insertGalleryImg() {
        restoreSelection(); const idx = $("imgGallerySelect").value; if(idx === "") return;
        const img = gallery[idx]; const link = img.link || localStorage.getItem("esm_global_link") || "";
        const html = `<div style="text-align:center; margin:20px 0;">${link ? `<a href="${link}" target="_blank"><img src="${img.url}" style="max-width:100%; border-radius:10px;"></a>` : `<img src="${img.url}" style="max-width:100%; border-radius:10px;">`}</div>`;
        document.execCommand('insertHTML', false, html); update();
    }
    function clearBody() { if(confirm("Clear?")) { $("bodyEditor").innerHTML = ""; $("subject").value = ""; update(); autoSave(); } }
    function copyText(t) { navigator.clipboard.writeText(t); showToast("Copied!"); }
    function copyAll() { copyText(`${$("subject").value}\n\n${getWrappedBody()}`); }

    window.onload = () => { loadDraft(); renderGallery(); renderSigs(); };
    let gallery = JSON.parse(localStorage.getItem("esm_gallery") || "[]");
    let signatures = JSON.parse(localStorage.getItem("esm_signatures") || "[]");
</script>
</body>
</html>
