<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLGS Content Hub - Pro Editor</title>
    <style>
        :root {
            --pro-blue: #0056b3;
            --pro-blue-hover: #004494;
            --pro-green: #28a745;
            --pro-green-hover: #218838;
            --bg-light: #f8f9fa;
            --border-color: #ced4da;
            /* Syntax Highlighting Colors */
            --syn-tag: #0000ff;
            --syn-attr: #ff0000;
            --syn-val: #8000ff;
            --syn-str: #808080;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 25px; /* Padding around layout */
            color: #333;
        }

        .hub-container {
            max-width: 1500px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        /* Header Area */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--pro-blue);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .header-left h1 {
            margin: 0;
            color: var(--pro-blue);
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
        }

        #timestamp-display {
            font-size: 24px; /* Larger text */
            font-weight: 800;
            color: #d9534f;
            background: #fff5f5;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #f5c6cb;
        }

        #timestamp-display.saved {
            color: var(--pro-green);
            background: #f0fff4;
            border-color: #c3e6cb;
        }

        /* Subject Line */
        .subject-box {
            margin-bottom: 25px;
        }

        .subject-box label {
            display: block;
            font-weight: bold;
            color: var(--pro-blue);
            margin-bottom: 8px;
            font-size: 18px;
        }

        #email-title {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
        }

        /* The Workspace */
        .workspace {
            display: flex;
            gap: 25px;
            height: 650px;
            margin-bottom: 25px;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
            position: relative;
        }

        .pane-header {
            background: var(--pro-blue);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        /* Notepad++ Style Editor (Left) */
        .editor-container {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        #html-input, #html-highlight {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            margin: 0; padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-sizing: border-box;
            border: none;
            overflow-y: auto;
        }

        #html-input {
            color: transparent;
            background: transparent;
            caret-color: #000;
            z-index: 2;
            resize: none;
            outline: none;
        }

        #html-highlight {
            z-index: 1;
            color: #333;
            pointer-events: none;
        }

        /* Syntax Color Tokens */
        .token-tag { color: var(--syn-tag); font-weight: bold; }
        .token-attr { color: var(--syn-attr); }
        .token-val { color: var(--syn-val); }
        .token-token { color: #d63384; font-weight: bold; background: #fff0f5; }

        /* WYSIWYG Visual Editor (Right) */
        .toolbar {
            background: #f8f9fa;
            border-bottom: 1px solid var(--border-color);
            padding: 8px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar button, .toolbar select {
            padding: 5px 10px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .toolbar input[type="color"] {
            width: 35px; height: 35px; border: none; cursor: pointer; background: none;
        }

        #visual-editor {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            outline: none;
            background: white;
        }

        /* Bottom Controls */
        .action-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-green { background: var(--pro-green); color: white; }
        .btn-green:hover { background: var(--pro-green-hover); }

        .btn-blue { background: var(--pro-blue); color: white; }
        .btn-blue:hover { background: var(--pro-blue-hover); }

        .btn-grey { background: #6c757d; color: white; }

        .footer-login {
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 30px;
        }

        .btn-mlgs {
            display: inline-block;
            width: 100%;
            max-width: 500px;
            background: var(--pro-green);
            color: white;
            padding: 22px;
            font-size: 24px;
            font-weight: 900;
            border-radius: 10px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(40,167,69,0.3);
        }
    </style>
</head>
<body>

<div class="hub-container">
    <header>
        <div class="header-left">
            <h1>MLGS Content Hub</h1>
        </div>
        <div id="timestamp-display">LAST SENT/SAVED: NEVER</div>
    </header>

    <div class="subject-box">
        <label>Subject Line / Title</label>
        <input type="text" id="email-title" placeholder="Enter Subject Line..." oninput="autoSave()">
    </div>

    <div class="workspace">
        <!-- LEFT: NOTEPAD++ STYLE CODE EDITOR -->
        <div class="pane">
            <div class="pane-header">HTML Code (Copy for MLGS)</div>
            <div class="editor-container">
                <div id="html-highlight"></div>
                <textarea id="html-input" spellcheck="false" oninput="syncFromCode()" onscroll="syncScroll()"></textarea>
            </div>
        </div>

        <!-- RIGHT: VISUAL WYSIWYG EDITOR -->
        <div class="pane">
            <div class="pane-header">Visual Preview / Editor</div>
            <div class="toolbar">
                <button onclick="exec('bold')">B</button>
                <button onclick="exec('italic')">I</button>
                <button onclick="exec('underline')">U</button>
                <select onchange="exec('fontSize', this.value); this.selectedIndex=0;">
                    <option value="">Size</option>
                    <option value="3">Small</option>
                    <option value="4">Normal</option>
                    <option value="5">Large</option>
                    <option value="7">Extra Large</option>
                </select>
                <input type="color" oninput="exec('foreColor', this.value)" title="Text Color">
                <button onclick="exec('createLink', prompt('Link URL:'))">Link</button>
                <button onclick="exec('insertImage', prompt('Image URL:'))">Img</button>
                <button onclick="exec('justifyLeft')">L</button>
                <button onclick="exec('justifyCenter')">C</button>
                <button onclick="exec('removeFormat')">Clear</button>
            </div>
            <div id="visual-editor" contenteditable="true" oninput="syncFromVisual()"></div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-green" onclick="downloadFile()">Save & Download</button>
        <button class="btn btn-blue" onclick="manualSave()">Save to Browser</button>
        <button class="btn btn-blue" onclick="document.getElementById('file-loader').click()">Load from PC</button>
        <button class="btn btn-grey" onclick="copyHTML()">Copy HTML Code</button>
    </div>

    <input type="file" id="file-loader" style="display:none" accept=".html">

    <div class="footer-login">
        <a href="https://www.myleadgenserect.com/login" target="_blank" class="btn-mlgs">OPEN MLGS LOGIN</a>
    </div>
</div>

<script>
    const htmlInput = document.getElementById('html-input');
    const htmlHighlight = document.getElementById('html-highlight');
    const visualEditor = document.getElementById('visual-editor');
    const emailTitle = document.getElementById('email-title');
    const timeDisplay = document.getElementById('timestamp-display');
    const fileLoader = document.getElementById('file-loader');

    // 1. Syntax Highlighting Engine (Notepad++ Style)
    function applyHighlighting(code) {
        let escaped = code
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // Highlight Tags
        escaped = escaped.replace(/&lt;(\/?[a-z1-6]+)(.*?)&gt;/gi, (match, tag, attrs) => {
            let highlightedAttrs = attrs.replace(/([a-z-]+)=(['"].*?['"])/gi, 
                '<span class="token-attr">$1</span>=<span class="token-val">$2</span>');
            return `<span class="token-tag">&lt;${tag}</span>${highlightedAttrs}<span class="token-tag">&gt;</span>`;
        });

        // Highlight MLGS Tokens {!token}
        escaped = escaped.replace(/\{!(.*?)\}/g, '<span class="token-token">{!$1}</span>');

        htmlHighlight.innerHTML = escaped + "\n";
    }

    // 2. Synchronization Logic
    function syncFromCode() {
        const code = htmlInput.value;
        applyHighlighting(code);
        visualEditor.innerHTML = code; // The visual editor displays what is in the code
        autoSave();
    }

    function syncFromVisual() {
        const code = visualEditor.innerHTML;
        htmlInput.value = code; // The code editor shows resulting HTML
        applyHighlighting(code);
        autoSave();
    }

    function syncScroll() {
        htmlHighlight.scrollTop = htmlInput.scrollTop;
    }

    // 3. WYSIWYG Commands
    function exec(command, value = null) {
        document.execCommand(command, false, value);
        syncFromVisual();
    }

    // 4. Persistence Logic (Browser & PC)
    function autoSave() {
        const data = {
            title: emailTitle.value,
            html: htmlInput.value,
            time: localStorage.getItem('mlgs_last_time') || "NEVER"
        };
        localStorage.setItem('mlgs_data', JSON.stringify(data));
    }

    function manualSave() {
        const now = new Date().toLocaleString();
        localStorage.setItem('mlgs_last_time', now);
        updateTimeUI(now);
        autoSave();
        alert("Content saved to browser session.");
    }

    function updateTimeUI(time) {
        timeDisplay.innerText = `LAST SENT/SAVED: ${time}`;
        timeDisplay.classList.add('saved');
    }

    function downloadFile() {
        const code = htmlInput.value;
        const blob = new Blob([code], { type: 'text/html' });
        const a = document.createElement('a');
        const filename = (emailTitle.value || 'mlgs-email') + '.html';
        
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        
        manualSave();
    }

    fileLoader.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            htmlInput.value = event.target.result;
            emailTitle.value = file.name.replace('.html', '');
            syncFromCode();
        };
        reader.readAsText(file);
    };

    function copyHTML() {
        htmlInput.select();
        document.execCommand('copy');
        alert("HTML Code copied! You can now paste this into the MLGS 'Source' box.");
    }

    // 5. Initialize on Load
    window.onload = () => {
        const saved = localStorage.getItem('mlgs_data');
        if (saved) {
            const data = JSON.parse(saved);
            emailTitle.value = data.title || "";
            htmlInput.value = data.html || "";
            syncFromCode();
            if (data.time !== "NEVER") updateTimeUI(data.time);
        }
    };
</script>

</body>
</html>
