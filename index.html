<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MLGS Source Mirror</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #252526; /* VS Code Grey */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* TOOLBAR */
        header {
            background: #333;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #007bff;
        }
        .title { color: #aaa; font-size: 12px; font-weight: bold; text-transform: uppercase; flex-grow: 1; }
        button {
            padding: 6px 12px;
            background: #444;
            color: #efefef;
            border: 1px solid #555;
            cursor: pointer;
            font-size: 12px;
            border-radius: 3px;
        }
        button:hover { background: #555; }
        .btn-copy { background: #007bff; border: none; }
        .btn-copy:hover { background: #0056b3; }

        /* DUAL VIEW */
        .workspace {
            display: flex;
            flex: 1;
            width: 100%;
        }

        /* THE EDITOR (LEFT) */
        #html-input {
            width: 50%;
            background: #1e1e1e;
            color: #d4d4d4; /* Standard Code Grey */
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            border-right: 1px solid #333;
        }

        /* THE RENDER (RIGHT) */
        #live-render {
            width: 50%;
            background: #ffffff; /* Emails are usually viewed on white */
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="title">MLGS Source Editor (Live Sync)</div>
        <div id="save-status" style="color: #5cb85c; font-size: 11px;">Data Local & Safe</div>
        <button onclick="clearAll()">Clear</button>
        <button class="btn-copy" onclick="copyAll()">Copy HTML</button>
    </header>

    <div class="workspace">
        <textarea id="html-input" spellcheck="false" placeholder="Paste MLGS Source Code here..." oninput="sync()"></textarea>

        <iframe id="live-render"></iframe>
    </div>

    <script>
        const input = document.getElementById('html-input');
        const render = document.getElementById('live-render');

        // Load your last work immediately
        window.onload = () => {
            const savedData = localStorage.getItem('mlgs_live_source');
            if (savedData) {
                input.value = savedData;
                sync();
            }
        };

        function sync() {
            const code = input.value;
            
            // This is the magic part: it takes the raw code and injects it 
            // directly into the frame with no extra wrappers or "page" code.
            const blob = new Blob([code], {type: 'text/html'});
            render.src = URL.createObjectURL(blob);

            // Autosave to your browser
            localStorage.setItem('mlgs_live_source', code);
        }

        function copyAll() {
            input.select();
            document.execCommand('copy');
            const status = document.getElementById('save-status');
            status.innerText = "COPIED TO CLIPBOARD";
            setTimeout(() => { status.innerText = "Data Local & Safe"; }, 2000);
        }

        function clearAll() {
            if(confirm("Wipe editor?")) {
                input.value = "";
                sync();
            }
        }
    </script>
</body>
</html>
