<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLGS Content Hub - Pro Sync Edition</title>
    <style>
        :root {
            --pro-blue: #0056b3;
            --pro-blue-hover: #004494;
            --pro-green: #28a745;
            --pro-green-hover: #218838;
            --bg-page: #f8f9fa;
            --border: #ced4da;
            /* Notepad++ Style Colors */
            --syn-tag: #0000ff;
            --syn-attr: #ff0000;
            --syn-val: #8000ff;
            --syn-token: #d63384;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            padding: 25px; /* Outer layout padding */
            color: #333;
        }

        .hub-container {
            max-width: 1550px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        /* Header & Status */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--pro-blue);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            color: var(--pro-blue);
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .timestamp-status {
            font-size: 24px; /* Large Noticeable Text */
            font-weight: 800;
            color: #d9534f;
            background: #fff5f5;
            padding: 10px 25px;
            border-radius: 8px;
            border: 2px solid #f5c6cb;
            transition: 0.3s;
        }

        .timestamp-status.saved {
            color: var(--pro-green);
            background: #f0fff4;
            border-color: #c3e6cb;
        }

        /* Subject Section */
        .subject-row {
            margin-bottom: 25px;
        }

        #email-title {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid var(--border);
            border-radius: 6px;
            outline-color: var(--pro-blue);
        }

        /* Editor Workspace */
        .workspace {
            display: flex;
            gap: 25px;
            height: 650px;
            margin-bottom: 25px;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .pane-label {
            background: var(--pro-blue);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Left Pane: HTML Notepad++ Style */
        .code-wrapper {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        #html-input, #html-highlight {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            margin: 0; padding: 20px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-sizing: border-box;
            border: none;
            overflow-y: auto;
        }

        #html-input {
            color: transparent;
            background: transparent;
            caret-color: black;
            z-index: 2;
            resize: none;
            outline: none;
        }

        #html-highlight {
            z-index: 1;
            color: #333;
            pointer-events: none;
        }

        /* Syntax Coloring */
        .tag { color: var(--syn-tag); font-weight: bold; }
        .attr { color: var(--syn-attr); }
        .val { color: var(--syn-val); }
        .token { color: var(--syn-token); background: #fff0f5; font-weight: bold; }

        /* Right Pane: Visual WYSIWYG */
        .toolbar {
            background: #f1f3f5;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar button, .toolbar select {
            padding: 6px 12px;
            border: 1px solid #adb5bd;
            background: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .toolbar button:hover { background: #e9ecef; }

        .toolbar input[type="color"] {
            width: 35px; height: 35px; border: none; cursor: pointer; background: none;
        }

        #visual-editor {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            outline: none;
            background: white;
        }

        /* Actions Bar */
        .action-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-green { background: var(--pro-green); color: white; }
        .btn-green:hover { background: var(--pro-green-hover); }
        .btn-blue { background: var(--pro-blue); color: white; }
        .btn-blue:hover { background: var(--pro-blue-hover); }
        .btn-grey { background: #6c757d; color: white; }

        /* Footer MLGS Link */
        footer {
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 30px;
        }

        .mlgs-login-btn {
            display: inline-block;
            width: 100%;
            max-width: 600px;
            background: var(--pro-green);
            color: white;
            padding: 25px;
            font-size: 26px;
            font-weight: 900;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(40,167,69,0.3);
        }
    </style>
</head>
<body>

<div class="hub-container">
    <header>
        <h1>MLGS Content Hub</h1>
        <div id="timestamp" class="timestamp-status">LAST SAVED: NEVER</div>
    </header>

    <div class="subject-row">
        <input type="text" id="email-title" placeholder="Enter Subject Line or Title..." oninput="autoSave()">
    </div>

    <div class="workspace">
        <!-- LEFT: HTML CODE (Notepad++ Highlighting) -->
        <div class="pane">
            <div class="pane-label">HTML Source Code</div>
            <div class="code-wrapper">
                <div id="html-highlight"></div>
                <textarea id="html-input" spellcheck="false" oninput="syncFromCode()" onscroll="syncScroll()"></textarea>
            </div>
        </div>

        <!-- RIGHT: VISUAL EDITOR (Syncs to Highlight) -->
        <div class="pane">
            <div class="pane-label">Visual Editor (Sync to Code)</div>
            <div class="toolbar">
                <button onclick="cmd('bold')">B</button>
                <button onclick="cmd('italic')">I</button>
                <button onclick="cmd('underline')">U</button>
                <select onchange="cmd('fontSize', this.value); this.selectedIndex=0;">
                    <option value="">Text Size</option>
                    <option value="3">Small</option>
                    <option value="4">Normal</option>
                    <option value="5">Large</option>
                    <option value="7">Extra Large</option>
                </select>
                <input type="color" oninput="cmd('foreColor', this.value)" title="Change Color">
                <button onclick="cmd('createLink', prompt('Enter URL:'))">Link</button>
                <button onclick="cmd('insertImage', prompt('Enter Image URL:'))">Image</button>
                <button onclick="cmd('justifyLeft')">Left</button>
                <button onclick="cmd('justifyCenter')">Center</button>
                <button onclick="cmd('removeFormat')">Clear Style</button>
            </div>
            <div id="visual-editor" contenteditable="true" 
                 oninput="syncFromVisual()" 
                 onmouseup="syncFromVisual()" 
                 onkeyup="syncFromVisual()">
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-green" onclick="downloadFile()">Save & Download</button>
        <button class="btn btn-blue" onclick="manualSave()">Save to Browser</button>
        <button class="btn btn-blue" onclick="document.getElementById('file-input').click()">Load Last File</button>
        <button class="btn btn-grey" onclick="copyCode()">Copy HTML</button>
    </div>

    <input type="file" id="file-input" style="display:none" accept=".html">

    <footer>
        <a href="https://www.myleadgenserect.com/login" target="_blank" class="mlgs-login-btn">OPEN MLGS LOGIN</a>
    </footer>
</div>

<script>
    const htmlInput = document.getElementById('html-input');
    const htmlHighlight = document.getElementById('html-highlight');
    const visualEditor = document.getElementById('visual-editor');
    const emailTitle = document.getElementById('email-title');
    const timeStatus = document.getElementById('timestamp');
    const fileInput = document.getElementById('file-input');

    // 1. Syntax Highlighter (Notepad++ Mimic)
    function applySyntax(code) {
        let escaped = code
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // Color Tags
        escaped = escaped.replace(/&lt;(\/?[a-z1-6]+)(.*?)&gt;/gi, (match, tag, attrs) => {
            let highlightedAttrs = attrs.replace(/([a-z-]+)=(['"].*?['"])/gi, 
                '<span class="attr">$1</span>=<span class="val">$2</span>');
            return `<span class="tag">&lt;${tag}</span>${highlightedAttrs}<span class="tag">&gt;</span>`;
        });

        // Color MLGS Tokens
        escaped = escaped.replace(/\{!(.*?)\}/g, '<span class="token">{!$1}</span>');

        htmlHighlight.innerHTML = escaped + "\n";
    }

    // 2. Real-Time Sync Logic
    function syncFromCode() {
        const code = htmlInput.value;
        applySyntax(code);
        visualEditor.innerHTML = code;
        autoSave();
    }

    function syncFromVisual() {
        const code = visualEditor.innerHTML;
        htmlInput.value = code;
        applySyntax(code);
        autoSave();
    }

    function syncScroll() {
        htmlHighlight.scrollTop = htmlInput.scrollTop;
    }

    // 3. Editor Commands
    function cmd(command, value = null) {
        document.execCommand(command, false, value);
        syncFromVisual(); // Immediate reflect in HTML box
    }

    // 4. Saving & Loading
    function autoSave() {
        const data = {
            title: emailTitle.value,
            html: htmlInput.value,
            time: localStorage.getItem('mlgs_pro_time') || "NEVER"
        };
        localStorage.setItem('mlgs_pro_data', JSON.stringify(data));
    }

    function manualSave() {
        const now = new Date().toLocaleString();
        localStorage.setItem('mlgs_pro_time', now);
        updateTimeUI(now);
        autoSave();
        alert("Saved to Browser!");
    }

    function updateTimeUI(time) {
        timeStatus.innerText = `LAST SAVED: ${time}`;
        timeStatus.classList.add('saved');
    }

    function downloadFile() {
        const code = htmlInput.value;
        const blob = new Blob([code], { type: 'text/html' });
        const a = document.createElement('a');
        const name = (emailTitle.value || 'mlgs-email') + '.html';
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        manualSave();
    }

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            htmlInput.value = event.target.result;
            emailTitle.value = file.name.replace('.html', '');
            syncFromCode();
        };
        reader.readAsText(file);
    };

    function copyCode() {
        htmlInput.select();
        document.execCommand('copy');
        alert("HTML Code Copied for MLGS!");
    }

    // 5. Initialize
    window.onload = () => {
        const stored = localStorage.getItem('mlgs_pro_data');
        if (stored) {
            const data = JSON.parse(stored);
            emailTitle.value = data.title || "";
            htmlInput.value = data.html || "";
            syncFromCode();
            if (data.time !== "NEVER") updateTimeUI(data.time);
        }
    };
</script>

</body>
</html>
