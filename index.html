<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLGS Content Hub - Professional Edition</title>
    <style>
        :root {
            --pro-blue: #0056b3;
            --pro-blue-hover: #004494;
            --pro-green: #28a745;
            --pro-green-hover: #218838;
            --bg-page: #f4f7f9;
            --border: #ced4da;
            --syn-tag: #0000ff;
            --syn-attr: #ff0000;
            --syn-val: #8000ff;
            --syn-token: #d63384;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            padding: 25px; 
            color: #333;
        }

        .main-hub {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--pro-blue);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; color: var(--pro-blue); font-size: 28px; font-weight: 900; text-transform: uppercase; }

        #top-timer-banner {
            font-size: 22px;
            font-weight: 900;
            padding: 10px 20px;
            border-radius: 6px;
            background: #eafff0;
            color: #28a745;
            border: 2px solid #c3e6cb;
        }

        .subject-row { margin-bottom: 20px; }

        #mlgs-subject-field-unique {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #fdfdfd;
        }

        .workspace {
            display: flex;
            gap: 20px;
            height: 600px;
            margin-bottom: 20px;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .pane-header {
            background: var(--pro-blue);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }

        .wysiwyg-toolbar { background: #f8f9fa; border-bottom: 1px solid var(--border); padding: 8px; display: flex; gap: 5px; }
        .wysiwyg-toolbar button, .wysiwyg-toolbar select { padding: 5px 10px; font-weight: bold; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }

        #visual-view { flex: 1; padding: 20px; overflow-y: auto; outline: none; background: white; font-size: 16px; }

        .code-container { position: relative; flex: 1; overflow: hidden; }
        #html-raw, #html-colored {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            margin: 0; padding: 20px; font-family: 'Consolas', monospace; font-size: 14px;
            line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; box-sizing: border-box; border: none; overflow-y: auto;
        }
        #html-raw { color: transparent; background: transparent; caret-color: black; z-index: 2; outline: none; resize: none;}
        #html-colored { z-index: 1; color: #333; pointer-events: none; }

        .tag { color: var(--syn-tag); font-weight: bold; }
        .attr { color: var(--syn-attr); }
        .val { color: var(--syn-val); }
        .mlgs-var { color: white; background: var(--syn-token); padding: 0 3px; border-radius: 3px; font-weight: bold; }

        .action-bar { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn { padding: 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; text-align: center; text-decoration: none; transition: 0.2s; flex: 1; }
        .btn-green { background: var(--pro-green); color: white; }
        .btn-blue { background: var(--pro-blue); color: white; }
        .btn-grey { background: #6c757d; color: white; }

        footer {
            border-top: 3px solid var(--pro-blue);
            padding-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: 1.5fr 1.2fr 1fr;
            gap: 20px;
            align-items: center;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .timer-display-box { text-align: center; border-right: 2px solid #eee; }
        .timer-val { font-size: 32px; font-weight: 900; color: #d9534f; display: block; }
        .timer-label { font-size: 12px; font-weight: bold; color: #777; text-transform: uppercase; }

        .manual-override-box { display: flex; flex-direction: column; gap: 8px; }
        .manual-override-box label { font-size: 12px; font-weight: bold; color: var(--pro-blue); }
        .manual-override-box input { padding: 10px; border: 1px solid var(--border); border-radius: 5px; font-weight: bold; }

        .footer-buttons { display: flex; gap: 15px; }
        .btn-huge { flex: 1; padding: 25px; font-size: 24px; font-weight: 900; }
    </style>
</head>
<body>

<div class="main-hub">
    <header>
        <h1>MLGS Content Hub</h1>
        <div id="top-timer-banner">READY TO MAIL</div>
    </header>

    <div class="subject-row">
        <input type="text" id="mlgs-subject-field-unique" placeholder="Subject Line / Email Title..." autocomplete="off">
    </div>

    <div class="workspace">
        <div class="pane">
            <div class="pane-header">Visual Editor & Preview</div>
            <div class="wysiwyg-toolbar">
                <button onclick="exec('bold')">B</button>
                <button onclick="exec('italic')">I</button>
                <button onclick="exec('underline')">U</button>
                <select onchange="exec('fontSize', this.value); this.selectedIndex=0;"><option value="">Size</option><option value="3">Small</option><option value="4">Normal</option><option value="5">Large</option><option value="7">Huge</option></select>
                <input type="color" oninput="exec('foreColor', this.value)" title="Color">
                <button onclick="exec('createLink', prompt('URL:'))">Link</button>
                <button onclick="exec('removeFormat')">Clear Style</button>
            </div>
            <div id="visual-view" contenteditable="true" oninput="syncFromVisual()"></div>
        </div>

        <div class="pane">
            <div class="pane-header">HTML Source Code</div>
            <div class="code-container">
                <div id="html-colored"></div>
                <textarea id="html-raw" spellcheck="false" oninput="syncFromCode()" onscroll="syncCodeScroll()"></textarea>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-green" onclick="downloadHTML()">Save & Download</button>
        <button class="btn btn-blue" onclick="openLivePreview()">Live Preview Test</button>
        <button class="btn btn-blue" onclick="restoreCheckpoint()">Restore Last Download</button>
        <button class="btn btn-grey" onclick="document.getElementById('file-input').click()">Browse PC Files</button>
        <button class="btn btn-grey" onclick="copyHTML()">Copy HTML Source</button>
    </div>
    <input type="file" id="file-input" style="display:none" accept=".html">

    <footer>
        <div class="timer-grid">
            <div class="timer-display-box">
                <span class="timer-label">Next Mailing Available In:</span>
                <span id="countdown-timer" class="timer-val">00:00:00</span>
            </div>
            
            <div class="timer-display-box">
                <span class="timer-label">Last Mailing Recorded:</span>
                <span id="last-saved-time-str" style="font-weight: bold; font-size: 14px; margin-top: 10px; display: block; color: #555;">NEVER RECORDED</span>
            </div>

            <div class="manual-override-box">
                <label>Manual Time Override:</label>
                <input type="datetime-local" id="manual-time-input">
                <button class="btn btn-blue" style="padding: 5px; font-size: 11px;" onclick="applyManualTime()">Set Custom Action Time</button>
            </div>
        </div>

        <div class="footer-buttons">
            <a href="https://www.myleadgensecret.com/index.php" target="_blank" class="btn btn-green btn-huge">OPEN MLGS LOGIN</a>
            <button class="btn btn-blue btn-huge" onclick="triggerMailingAction()">UPDATE TIME / DATE NOW</button>
        </div>
    </footer>
</div>

<script>
    const visualView = document.getElementById('visual-view');
    const htmlRaw = document.getElementById('html-raw');
    const htmlColored = document.getElementById('html-colored');
    const titleInput = document.getElementById('mlgs-subject-field-unique');
    const fileInput = document.getElementById('file-input');
    const countdownDisplay = document.getElementById('countdown-timer');
    const lastSavedDisplay = document.getElementById('last-saved-time-str');
    const topBanner = document.getElementById('top-timer-banner');
    const manualTimeInput = document.getElementById('manual-time-input');

    // --- UNDO/REDO SYSTEM ---
    let historyStack = [];
    let redoStack = [];
    const maxHistory = 50;

    function saveState() {
        const currentState = {
            title: titleInput.value,
            content: htmlRaw.value
        };
        if (historyStack.length === 0 || JSON.stringify(currentState) !== JSON.stringify(historyStack[historyStack.length - 1])) {
            historyStack.push(currentState);
            if (historyStack.length > maxHistory) historyStack.shift();
            redoStack = []; 
        }
    }

    function undo() {
        if (historyStack.length > 1) {
            redoStack.push(historyStack.pop());
            const previousState = historyStack[historyStack.length - 1];
            applyState(previousState);
        }
    }

    function redo() {
        if (redoStack.length > 0) {
            const nextState = redoStack.pop();
            historyStack.push(nextState);
            applyState(nextState);
        }
    }

    function applyState(state) {
        titleInput.value = state.title;
        htmlRaw.value = state.content;
        visualView.innerHTML = state.content;
        applySyntax(state.content);
        autoSaveContent();
    }

    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key.toLowerCase() === 'z') {
            e.preventDefault();
            undo();
        }
        if (e.ctrlKey && e.key.toLowerCase() === 'y') {
            e.preventDefault();
            redo();
        }
    });

    // --- CORE EDITOR FUNCTIONS ---
    function applySyntax(code) {
        let escaped = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        escaped = escaped.replace(/&lt;(\/?[a-z1-6]+)(.*?)&gt;/gi, (match, tag, attrs) => {
            let highlightedAttrs = attrs.replace(/([a-z-]+)=(['"].*?['"])/gi, '<span class="attr">$1</span>=<span class="val">$2</span>');
            return `<span class="tag">&lt;${tag}</span>${highlightedAttrs}<span class="tag">&gt;</span>`;
        });
        escaped = escaped.replace(/\{!(.*?)\}/g, '<span class="mlgs-var">{!$1}</span>');
        htmlColored.innerHTML = escaped + "\n";
    }

    let saveTimer;
    function syncFromCode() { 
        applySyntax(htmlRaw.value); 
        visualView.innerHTML = htmlRaw.value; 
        autoSaveContent(); 
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveState, 500);
    }

    function syncFromVisual() { 
        htmlRaw.value = visualView.innerHTML; 
        applySyntax(htmlRaw.value); 
        autoSaveContent(); 
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveState, 500);
    }

    function syncCodeScroll() { htmlColored.scrollTop = htmlRaw.scrollTop; }
    
    function exec(cmd, val = null) { 
        saveState();
        document.execCommand(cmd, false, val); 
        syncFromVisual(); 
    }

    // --- SAVE, DOWNLOAD & FILE FUNCTIONS ---
    function downloadHTML() {
        const content = htmlRaw.value;
        const title = titleInput.value || "Untitled_Email";
        const blob = new Blob([content], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${title.replace(/\s+/g, '_')}.html`;
        a.click();
        
        // Save checkpoint
        localStorage.setItem('mlgs_checkpoint', JSON.stringify({ title: title, content: content }));
        alert("File Downloaded & Checkpoint Saved!");
    }

    function restoreCheckpoint() {
        const saved = localStorage.getItem('mlgs_checkpoint');
        if (saved) {
            saveState();
            const data = JSON.parse(saved);
            titleInput.value = data.title;
            htmlRaw.value = data.content;
            syncFromCode();
            alert("Last download restored.");
        } else {
            alert("No checkpoint found.");
        }
    }

    function copyHTML() {
        navigator.clipboard.writeText(htmlRaw.value);
        alert("HTML Source Copied to Clipboard!");
    }

    function openLivePreview() {
        const content = htmlRaw.value;
        const previewWin = window.open("", "MLGSPreview", "width=800,height=800");
        previewWin.document.write('<html><head><title>Preview</title></head><body>' + content + '</body></html>');
        previewWin.document.close();
    }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            saveState();
            htmlRaw.value = e.target.result;
            titleInput.value = file.name.replace('.html', '');
            syncFromCode();
        };
        reader.readAsText(file);
    });

    // --- TIMER & MAILING ---
    function updateMailingTimer() {
        const lastSavedTimestamp = localStorage.getItem('mlgs_timestamp_ms');
        if (!lastSavedTimestamp || lastSavedTimestamp === "null") return;
        const waitPeriod = 23 * 60 * 60 * 1000; 
        const nextMailTime = parseInt(lastSavedTimestamp) + waitPeriod;
        const diff = nextMailTime - Date.now();
        if (diff <= 0) {
            countdownDisplay.innerText = "00:00:00";
            topBanner.innerText = "READY TO MAIL";
            topBanner.style.background = "#eafff0";
            topBanner.style.color = "#28a745";
        } else {
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            countdownDisplay.innerText = `${h}:${m}:${s}`;
            topBanner.innerText = `NEXT MAIL IN: ${h}:${m}:${s}`;
            topBanner.style.background = "#fff4f4";
            topBanner.style.color = "#d9534f";
        }
    }

    function triggerMailingAction(customMs = null) {
        const ms = customMs || Date.now();
        localStorage.setItem('mlgs_timestamp_ms', ms);
        const dateString = new Date(ms).toLocaleString();
        localStorage.setItem('mlgs_last_timestamp_str', dateString);
        lastSavedDisplay.innerText = dateString;
    }

    function applyManualTime() {
        const val = manualTimeInput.value;
        if (!val) return alert("Select a date/time first.");
        const customMs = new Date(val).getTime();
        triggerMailingAction(customMs);
        alert("Mailing time updated!");
    }

    function autoSaveContent() {
        localStorage.setItem('mlgs_session_content', JSON.stringify({ 
            title: titleInput.value, 
            content: htmlRaw.value 
        }));
    }

    window.onload = () => {
        const session = localStorage.getItem('mlgs_session_content');
        if (session) {
            const data = JSON.parse(session);
            titleInput.value = data.title || "";
            htmlRaw.value = data.content || "";
            syncFromCode();
            saveState(); 
        }
        const lastStr = localStorage.getItem('mlgs_last_timestamp_str');
        if (lastStr) lastSavedDisplay.innerText = lastStr;
        setInterval(updateMailingTimer, 1000);
    };
</script>

</body>
</html>
