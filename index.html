<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLGS Content Tracker - Live Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: #212529;
            color: white;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title { font-size: 20px; font-weight: 800; text-transform: uppercase; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #dee2e6; }
        .tab {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 4px solid transparent;
        }
        .tab.active {
            border-bottom: 4px solid #007bff;
            color: #007bff;
            background: #f8f9fa;
        }
        .main-content { flex: 1; display: flex; position: relative; }
        .panel {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
        }
        .panel.active { display: flex; }
        #code-editor {
            flex: 1;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            padding: 20px;
            border: none;
            resize: none;
            outline: none;
            background: #ffffff;
        }
        .toolbar {
            padding: 10px 20px;
            background: #f1f3f5;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            cursor: pointer;
            font-weight: bold;
        }
        .primary { background: #007bff; color: white; border: none; }
        #preview-frame { flex: 1; border: none; width: 100%; height: 100%; background: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">MLGS Tracker Editor</div>
        <div id="status" style="color:#28a745;">✅ Ready</div>
    </header>

    <div class="tabs">
        <div class="tab active" id="tab-code" onclick="switchMode(0)">✏️ Edit Code</div>
        <div class="tab" id="tab-preview" onclick="switchMode(1)">👁️ View Tracker</div>
    </div>

    <div class="main-content">
        <div class="panel active" id="code-panel">
            <div class="toolbar">
                <button class="primary" onclick="updatePreview()">Update Preview</button>
                <button onclick="copyCode()">Copy Code</button>
                <button onclick="resetToOriginal()">Reset</button>
            </div>
            <textarea id="code-editor" spellcheck="false"></textarea>
        </div>

        <div class="panel" id="preview-panel">
            <iframe id="preview-frame"></iframe>
        </div>
    </div>

    <script>
        // The core tracker HTML
        const originalHTML = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .time { background: #eee; padding: 10px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        textarea, input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="time" id="ts">LAST SAVED: NEVER</div>
        <input type="text" id="sub" placeholder="Subject Line">
        <textarea id="body" rows="10" placeholder="Email Body"></textarea>
        <button onclick="save()">SAVE & UPDATE TIME</button>
    </div>
    <script>
        window.onload = function() {
            document.getElementById('sub').value = localStorage.getItem('mlgs_sub') || '';
            document.getElementById('body').value = localStorage.getItem('mlgs_body') || '';
            document.getElementById('ts').innerText = "LAST SAVED: " + (localStorage.getItem('mlgs_ts') || 'NEVER');
        };
        function save() {
            const now = new Date().toLocaleString();
            localStorage.setItem('mlgs_sub', document.getElementById('sub').value);
            localStorage.setItem('mlgs_body', document.getElementById('body').value);
            localStorage.setItem('mlgs_ts', now);
            document.getElementById('ts').innerText = "LAST SAVED: " + now;
            alert("Saved!");
        }
    <\/script>
</body>
</html>`;

        const editor = document.getElementById('code-editor');
        const frame = document.getElementById('preview-frame');

        function init() {
            editor.value = originalHTML;
            updatePreview();
        }

        function switchMode(mode) {
            document.getElementById('tab-code').classList.toggle('active', mode === 0);
            document.getElementById('tab-preview').classList.toggle('active', mode === 1);
            document.getElementById('code-panel').classList.toggle('active', mode === 0);
            document.getElementById('preview-panel').classList.toggle('active', mode === 1);
            if(mode === 1) updatePreview();
        }

        function updatePreview() {
            const content = editor.value;
            // Using blob to ensure localStorage works across GitHub domains
            const blob = new Blob([content], {type: 'text/html'});
            frame.src = URL.createObjectURL(blob);
        }

        function copyCode() {
            navigator.clipboard.writeText(editor.value);
            alert("Code copied!");
        }

        function resetToOriginal() {
            if(confirm("Reset?")) { editor.value = originalHTML; updatePreview(); }
        }

        window.onload = init;
    </script>
</body>
</html>
