<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLGS Content Hub - Pro Sync</title>
    <style>
        :root {
            --pro-blue: #0056b3; --pro-green: #28a745; --bg-page: #f4f7f9; --border: #ced4da;
            --syn-tag: #0000ff; --syn-attr: #ff0000; --syn-val: #8000ff; --syn-token: #d63384;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-page); margin: 0; padding: 25px; color: #333; }
        .main-hub { max-width: 1600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--pro-blue); padding-bottom: 15px; margin-bottom: 20px; }
        #top-timer-banner { font-size: 20px; font-weight: 900; padding: 10px 20px; border-radius: 6px; background: #eafff0; color: #28a745; border: 2px solid #c3e6cb; }
        .subject-row { margin-bottom: 20px; }
        #mlgs-subject-field-unique { width: 100%; padding: 15px; font-size: 20px; font-weight: bold; border: 2px solid var(--border); border-radius: 8px; }
        .workspace { display: flex; gap: 20px; height: 550px; margin-bottom: 20px; }
        .pane { flex: 1; display: flex; flex-direction: column; border: 2px solid var(--border); border-radius: 8px; overflow: hidden; background: white; }
        .pane-header { background: var(--pro-blue); color: white; padding: 10px 15px; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .toolbar { background: #f8f9fa; border-bottom: 1px solid var(--border); padding: 8px; display: flex; gap: 5px; }
        .toolbar button { padding: 5px 10px; cursor: pointer; font-weight: bold; }
        #visual-view { flex: 1; padding: 20px; overflow-y: auto; outline: none; background: white; font-size: 16px; }
        .code-container { position: relative; flex: 1; overflow: hidden; }
        #html-raw, #html-colored { position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; padding: 20px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.5; white-space: pre-wrap; box-sizing: border-box; border: none; overflow-y: auto; }
        #html-raw { color: transparent; background: transparent; caret-color: black; z-index: 2; outline: none; resize: none; }
        #html-colored { z-index: 1; color: #333; pointer-events: none; }
        .tag { color: var(--syn-tag); } .attr { color: var(--syn-attr); } .val { color: var(--syn-val); } .mlgs-var { color: white; background: var(--syn-token); padding: 0 2px; }
        .btn { padding: 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; text-align: center; flex: 1; transition: 0.2s; text-decoration: none;}
        .btn-green { background: var(--pro-green); color: white; } .btn-blue { background: var(--pro-blue); color: white; } .btn-grey { background: #6c757d; color: white; }
        footer { border-top: 3px solid var(--pro-blue); padding-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        .timer-val { font-size: 28px; font-weight: 900; color: #d9534f; display: block; }
        .footer-buttons { display: flex; gap: 15px; }
        .btn-huge { flex: 1; padding: 20px; font-size: 22px; font-weight: 900; }
        .instr { font-size: 11px; color: #666; font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>

<div class="main-hub">
    <header>
        <h1>MLGS Hub</h1>
        <div id="top-timer-banner">READY TO MAIL</div>
    </header>

    <div class="subject-row">
        <input type="text" id="mlgs-subject-field-unique" placeholder="Email Subject Line..." autocomplete="off">
    </div>

    <div class="workspace">
        <div class="pane">
            <div class="pane-header">Visual Preview (Hold CTRL to click links)</div>
            <div class="toolbar">
                <button onclick="exec('bold')">B</button>
                <button onclick="exec('italic')">I</button>
                <button onclick="exec('createLink', prompt('URL:'))">Link</button>
                <button onclick="exec('insertImage', prompt('Image URL:'))">Img</button>
                <button onclick="exec('removeFormat')">CLR</button>
            </div>
            <div id="visual-view" contenteditable="true" oninput="syncFromVisual()"></div>
        </div>

        <div class="pane">
            <div class="pane-header">HTML Code</div>
            <div class="code-container">
