<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MLGS IDE - Split View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* TOP BAR */
        header {
            background: #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #007bff;
        }
        .logo { font-weight: bold; color: #007bff; letter-spacing: 1px; }
        .status-msg { font-size: 12px; color: #888; }

        /* SPLIT SCREEN LAYOUT */
        .editor-container {
            flex: 1;
            display: flex;
            width: 100vw;
        }

        /* LEFT SIDE: THE CODE */
        .code-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #333;
        }
        .label-bar {
            background: #2d2d2d;
            padding: 5px 15px;
            font-size: 12px;
            text-transform: uppercase;
            color: #aaa;
        }
        #code-input {
            flex: 1;
            background: #1e1e1e;
            color: #9cdcfe; /* Light Blue Code Color */
            border: none;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        /* RIGHT SIDE: THE LIVE SITE */
        .preview-side {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
        }
        #preview-iframe {
            flex: 1;
            border: none;
            background: white;
        }

        /* BOTTOM CONTROLS */
        footer {
            background: #252526;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            border-top: 1px solid #333;
        }
        button {
            padding: 8px 20px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn-copy { background: #007bff; color: white; }
        .btn-clear { background: #d9534f; color: white; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MLGS PREVIEW IDE v1.0</div>
        <div class="status-msg" id="save-status">Autosave Enabled (Local)</div>
    </header>

    <div class="editor-container">
        <div class="code-side">
            <div class="label-bar">HTML Source Code</div>
            <textarea id="code-input" spellcheck="false" oninput="run()"></textarea>
        </div>

        <div class="preview-side">
            <div class="label-bar" style="background: #e1e1e1; color: #666;">Live Site Preview</div>
            <iframe id="preview-iframe"></iframe>
        </div>
    </div>

    <footer>
        <button class="btn-copy" onclick="copyToClipboard()">Copy All Code</button>
        <button class="btn-clear" onclick="clearAll()">Clear Editor</button>
        <div style="margin-left: auto; color: #5cb85c; font-weight: bold; padding-top: 5px;">
            No Timeout Active - Data Safely Stored in Browser
        </div>
    </footer>

    <script>
        const editor = document.getElementById('code-input');
        const frame = document.getElementById('preview-iframe');
        const status = document.getElementById('save-status');

        // Initial Load
        window.onload = () => {
            const saved = localStorage.getItem('mlgs_work_v5');
            if (saved) {
                editor.value = saved;
                run();
            } else {
                // Default placeholder
                editor.value = "<h1>Welcome</h1>\n<p>Start typing your MLGS HTML here...</p>";
                run();
            }
        };

        // The "Run" function - handles preview and auto-save
        function run() {
            const code = editor.value;
            
            // 1. Render the Preview
            const blob = new Blob([code], {type: 'text/html'});
            frame.src = URL.createObjectURL(blob);

            // 2. Local Autosave
            localStorage.setItem('mlgs_work_v5', code);
            
            status.innerText = "Last update: " + new Date().toLocaleTimeString();
        }

        function copyToClipboard() {
            editor.select();
            document.execCommand('copy');
            alert("Code copied to clipboard! You can now paste this into MLGS.");
        }

        function clearAll() {
            if(confirm("Wipe everything in the editor?")) {
                editor.value = "";
                run();
            }
        }
    </script>
</body>
</html>
