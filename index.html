<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLGS Content Hub - Pro WYSIWYG</title>
    <style>
        :root {
            --pro-blue: #0056b3;
            --pro-blue-hover: #004494;
            --pro-green: #28a745;
            --pro-green-hover: #218838;
            --bg-page: #f0f2f5;
            --border: #ced4da;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-page);
            color: #333;
            margin: 0;
            padding: 25px; /* Added 25px padding around layout */
            line-height: 1.6;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* Header Section */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--pro-blue);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            color: var(--pro-blue);
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .timestamp-status {
            font-size: 22px; /* Larger text as requested */
            font-weight: bold;
            color: #d9534f; /* Noticeable Red until saved */
            background: #fff5f5;
            padding: 5px 15px;
            border-radius: 8px;
            border: 2px solid #f5c6cb;
        }

        .timestamp-status.saved {
            color: var(--pro-green);
            background: #f0fff4;
            border-color: #c3e6cb;
        }

        /* Subject Box */
        .subject-row {
            margin-bottom: 20px;
        }

        .subject-row label {
            font-weight: bold;
            color: var(--pro-blue);
            display: block;
            margin-bottom: 8px;
        }

        #email-title {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* Dual Editor Workspace */
        .workspace {
            display: flex;
            gap: 20px;
            height: 600px;
            margin-bottom: 25px;
        }

        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .pane-label {
            background: var(--pro-blue);
            color: white;
            padding: 8px 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        /* WYSIWYG Toolbar */
        .toolbar {
            background: #f8f9fa;
            padding: 5px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .toolbar button {
            padding: 5px 10px;
            cursor: pointer;
            background: white;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-weight: bold;
        }

        .toolbar button:hover { background: #e2e6ea; }

        /* Editing Areas */
        #visual-editor {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            outline: none;
            background: white;
        }

        #html-editor {
            flex: 1;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            border: none;
            resize: none;
            background: #272822;
            color: #f8f8f2;
            outline: none;
        }

        /* Buttons Section */
        .action-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-blue { background-color: var(--pro-blue); color: white; }
        .btn-blue:hover { background-color: var(--pro-blue-hover); }

        .btn-green { background-color: var(--pro-green); color: white; }
        .btn-green:hover { background-color: var(--pro-green-hover); }

        .btn-secondary { background-color: #6c757d; color: white; }

        footer {
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
            text-align: center;
        }

        .mlgs-link {
            display: inline-block;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background-color: var(--pro-green);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 900;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>MLGS Content Hub</h1>
        <div id="timestamp" class="timestamp-status">LAST SAVED: NEVER</div>
    </header>

    <div class="subject-row">
        <label>Email Subject / Document Title</label>
        <input type="text" id="email-title" placeholder="Enter your subject line here...">
    </div>

    <div class="workspace">
        <!-- LEFT SIDE: WYSIWYG PREVIEW -->
        <div class="editor-pane">
            <div class="pane-label">Visual Editor (Live Preview)</div>
            <div class="toolbar">
                <button onclick="execCmd('bold')">B</button>
                <button onclick="execCmd('italic')">I</button>
                <button onclick="execCmd('underline')">U</button>
                <button onclick="execCmd('justifyLeft')">Left</button>
                <button onclick="execCmd('justifyCenter')">Center</button>
                <button onclick="execCmd('insertUnorderedList')">• List</button>
                <button onclick="execCmd('createLink', prompt('Enter URL:'))">Link</button>
                <button onclick="execCmd('formatBlock', 'h1')">H1</button>
                <button onclick="execCmd('formatBlock', 'h2')">H2</button>
                <button onclick="execCmd('removeFormat')">Clear</button>
            </div>
            <div id="visual-editor" contenteditable="true" oninput="syncToHtml()"></div>
        </div>

        <!-- RIGHT SIDE: HTML SOURCE -->
        <div class="editor-pane">
            <div class="pane-label">
                HTML Source Code
                <span style="font-weight: normal; font-size: 11px; opacity: 0.8;">Auto-syncs to Preview</span>
            </div>
            <textarea id="html-editor" oninput="syncToVisual()" placeholder="Paste HTML code here..."></textarea>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-green" onclick="saveToPC()">Save Content (.html)</button>
        <button class="btn btn-blue" onclick="saveToBrowser()">Save to Browser</button>
        <button class="btn btn-blue" onclick="document.getElementById('file-input').click()">Load from PC</button>
        <button class="btn btn-secondary" onclick="copyCode()">Copy HTML</button>
    </div>

    <input type="file" id="file-input" style="display:none" accept=".html">

    <footer>
        <a href="https://www.myleadgenserect.com/login" target="_blank" class="mlgs-link">OPEN MLGS LOGIN</a>
    </footer>
</div>

<script>
    const visualEditor = document.getElementById('visual-editor');
    const htmlEditor = document.getElementById('html-editor');
    const emailTitle = document.getElementById('email-title');
    const timestampBox = document.getElementById('timestamp');
    const fileInput = document.getElementById('file-input');

    // 1. WYSIWYG Command Function
    function execCmd(command, value = null) {
        document.execCommand(command, false, value);
        syncToHtml();
    }

    // 2. Sync Logic: Visual -> HTML
    function syncToHtml() {
        htmlEditor.value = visualEditor.innerHTML;
        autoSave();
    }

    // 3. Sync Logic: HTML -> Visual
    function syncToVisual() {
        visualEditor.innerHTML = htmlEditor.value;
        autoSave();
    }

    // 4. Save to Browser (LocalStorage)
    function saveToBrowser() {
        const data = {
            title: emailTitle.value,
            content: htmlEditor.value,
            time: new Date().toLocaleString()
        };
        localStorage.setItem('mlgs_hub_data', JSON.stringify(data));
        updateTimestamp(data.time);
        alert('Saved to browser storage!');
    }

    function autoSave() {
        // Silent save to browser for crash protection
        const data = {
            title: emailTitle.value,
            content: htmlEditor.value,
            time: localStorage.getItem('mlgs_hub_time') || "Draft"
        };
        localStorage.setItem('mlgs_hub_data', JSON.stringify(data));
    }

    // 5. Save to PC (Download)
    function saveToPC() {
        const content = htmlEditor.value;
        const filename = (emailTitle.value || 'mlgs-email') + '.html';
        const blob = new Blob([content], {type: 'text/html'});
        const link = document.createElement('a');
        
        link.href = window.URL.createObjectURL(blob);
        link.download = filename;
        link.click();

        const now = new Date().toLocaleString();
        updateTimestamp(now);
        localStorage.setItem('mlgs_hub_time', now);
        saveToBrowser();
    }

    // 6. Load from PC
    fileInput.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = event => {
            htmlEditor.value = event.target.result;
            visualEditor.innerHTML = event.target.result;
            emailTitle.value = file.name.replace('.html', '');
            updateTimestamp("FILE LOADED");
        };
        reader.readAsText(file);
    };

    // 7. Utility Functions
    function updateTimestamp(time) {
        timestampBox.innerText = `LAST SAVED: ${time}`;
        timestampBox.classList.add('saved');
    }

    function copyCode() {
        htmlEditor.select();
        document.execCommand('copy');
        alert('HTML Code copied to clipboard!');
    }

    // 8. On Page Load: Retrieve Data
    window.onload = () => {
        const savedData = localStorage.getItem('mlgs_hub_data');
        if (savedData) {
            const parsed = JSON.parse(savedData);
            emailTitle.value = parsed.title || "";
            htmlEditor.value = parsed.content || "";
            visualEditor.innerHTML = parsed.content || "";
            if(parsed.time) updateTimestamp(parsed.time);
        }
    };

</script>

</body>
</html>
