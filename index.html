<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLGS Content Hub - Pro Edition</title>
    <style>
        :root {
            --pro-blue: #0056b3;
            --pro-blue-hover: #004494;
            --pro-green: #28a745;
            --pro-green-hover: #218838;
            --bg-page: #f4f7f9;
            --border: #ced4da;
            /* Syntax Colors */
            --syn-tag: #0000ff;
            --syn-attr: #ff0000;
            --syn-val: #8000ff;
            --syn-token: #d63384;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            padding: 25px; /* Minimum padding around layout */
            color: #333;
        }

        .main-hub {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        /* Header & Large Status Box */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--pro-blue);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            color: var(--pro-blue);
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 26px; /* Highly Noticeable */
            font-weight: 900;
            padding: 12px 30px;
            border-radius: 8px;
            background: #fff5f5;
            color: #d9534f;
            border: 2px solid #f5c6cb;
            transition: 0.3s ease;
        }

        .status-badge.saved {
            background: #eafff0;
            color: var(--pro-green);
            border-color: #c3e6cb;
        }

        /* Bitwarden Protected Subject Box */
        .subject-row {
            margin-bottom: 25px;
        }

        #mlgs-doc-title-input {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #fdfdfd;
            outline-color: var(--pro-blue);
        }

        /* Workspace Grid: Visual (Left) | HTML (Right) */
        .workspace {
            display: flex;
            gap: 25px;
            height: 650px;
            margin-bottom: 25px;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .pane-header {
            background: var(--pro-blue);
            color: white;
            padding: 12px 18px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
        }

        /* Visual Pane */
        .wysiwyg-toolbar {
            background: #f8f9fa;
            border-bottom: 1px solid var(--border);
            padding: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .wysiwyg-toolbar button, .wysiwyg-toolbar select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        #visual-view {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            outline: none;
            background: white;
            font-size: 16px;
        }

        /* HTML Pane (Notepad++ Highlighting) */
        .code-container {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        #html-raw, #html-colored {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            margin: 0; padding: 20px;
            font-family: 'Consolas', monospace;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-sizing: border-box;
            border: none;
            overflow-y: auto;
        }

        #html-raw { color: transparent; background: transparent; caret-color: black; z-index: 2; outline: none; resize: none;}
        #html-colored { z-index: 1; color: #333; pointer-events: none; }

        /* Highlight Tokens */
        .tag { color: var(--syn-tag); font-weight: bold; }
        .attr { color: var(--syn-attr); }
        .val { color: var(--syn-val); }
        .mlgs-var { color: white; background: var(--syn-token); padding: 0 3px; border-radius: 3px; font-weight: bold; }

        /* Main Action Bar */
        .action-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            align-items: center;
        }

        .btn {
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-main { flex: 2; padding: 22px; font-size: 18px; }
        .btn-sub { flex: 1; font-size: 14px; }

        .btn-green { background: var(--pro-green); color: white; }
        .btn-blue { background: var(--pro-blue); color: white; }
        .btn-grey { background: #6c757d; color: white; }
        .btn:hover { opacity: 0.95; transform: translateY(-1px); }

        /* Footer Controls */
        footer {
            border-top: 2px solid #eee;
            padding-top: 30px;
            display: flex;
            gap: 20px;
        }

        .btn-footer {
            flex: 1;
            padding: 25px;
            font-size: 26px;
            font-weight: 900;
        }
    </style>
</head>
<body>

<div class="main-hub">
    <header>
        <h1>MLGS Content Hub</h1>
        <div id="save-status-box" class="status-badge">LAST SAVED: NEVER</div>
    </header>

    <div class="subject-row">
        <input type="text" id="mlgs-doc-title-input" 
               placeholder="Subject Line / Email Title..." 
               autocomplete="off" 
               data-lpignore="true">
    </div>

    <div class="workspace">
        <!-- LEFT: VISUAL (PREVIEW) -->
        <div class="pane">
            <div class="pane-header">Visual Editor & Preview</div>
            <div class="wysiwyg-toolbar">
                <button onclick="exec('bold')">B</button>
                <button onclick="exec('italic')">I</button>
                <button onclick="exec('underline')">U</button>
                <select onchange="exec('fontSize', this.value); this.selectedIndex=0;">
                    <option value="">Size</option>
                    <option value="3">Small</option>
                    <option value="4">Normal</option>
                    <option value="5">Large</option>
                    <option value="7">Huge</option>
                </select>
                <input type="color" oninput="exec('foreColor', this.value)" title="Color">
                <button onclick="exec('createLink', prompt('URL:'))">Link</button>
                <button onclick="exec('insertImage', prompt('Image URL:'))">Img</button>
                <button onclick="exec('removeFormat')">Clear Style</button>
            </div>
            <div id="visual-view" contenteditable="true" 
                 oninput="syncFromVisual()" 
                 onmouseup="syncSelectionToCode()" 
                 onkeyup="syncSelectionToCode()">
            </div>
        </div>

        <!-- RIGHT: HTML (NOTEPAD++) -->
        <div class="pane">
            <div class="pane-header">HTML Source Code</div>
            <div class="code-container">
                <div id="html-colored"></div>
                <textarea id="html-raw" spellcheck="false" oninput="syncFromCode()" onscroll="syncCodeScroll()"></textarea>
            </div>
        </div>
    </div>

    <!-- Main Buttons Bar -->
    <div class="action-bar">
        <button class="btn btn-green btn-main" onclick="downloadHTML()">Save & Download File</button>
        <button class="btn btn-blue btn-main" onclick="restoreCheckpoint()">Restore Last Downloaded</button>
        <button class="btn btn-grey btn-sub" onclick="document.getElementById('file-input').click()">Browse PC Files</button>
        <button class="btn btn-grey btn-sub" onclick="copyHTML()">Copy HTML Source</button>
    </div>

    <input type="file" id="file-input" style="display:none" accept=".html">

    <!-- Footer -->
    <footer>
        <a href="https://www.myleadgenserect.com/login" target="_blank" class="btn btn-green btn-footer">OPEN MLGS LOGIN</a>
        <button class="btn btn-blue btn-footer" onclick="manualLogTime()">UPDATE TIME / DATE</button>
    </footer>
</div>

<script>
    const visualView = document.getElementById('visual-view');
    const htmlRaw = document.getElementById('html-raw');
    const htmlColored = document.getElementById('html-colored');
    const titleInput = document.getElementById('mlgs-doc-title-input');
    const statusBox = document.getElementById('save-status-box');
    const fileInput = document.getElementById('file-input');

    // 1. Selection Sync
    function syncSelectionToCode() {
        const selection = window.getSelection();
        const selectedText = selection.toString().trim();
        if (selectedText.length > 2) {
            const code = htmlRaw.value;
            const index = code.indexOf(selectedText);
            if (index !== -1) {
                htmlRaw.focus();
                htmlRaw.setSelectionRange(index, index + selectedText.length);
                const linesBefore = code.substr(0, index).split("\n").length;
                htmlRaw.scrollTop = (linesBefore - 5) * 22; 
            }
        }
        autoSave();
    }

    // 2. Syntax Highlighting
    function applySyntax(code) {
        let escaped = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        escaped = escaped.replace(/&lt;(\/?[a-z1-6]+)(.*?)&gt;/gi, (match, tag, attrs) => {
            let highlightedAttrs = attrs.replace(/([a-z-]+)=(['"].*?['"])/gi, '<span class="attr">$1</span>=<span class="val">$2</span>');
            return `<span class="tag">&lt;${tag}</span>${highlightedAttrs}<span class="tag">&gt;</span>`;
        });
        escaped = escaped.replace(/\{!(.*?)\}/g, '<span class="mlgs-var">{!$1}</span>');
        htmlColored.innerHTML = escaped + "\n";
    }

    // 3. Sync Logic
    function syncFromCode() {
        applySyntax(htmlRaw.value);
        visualView.innerHTML = htmlRaw.value;
        autoSave();
    }

    function syncFromVisual() {
        htmlRaw.value = visualView.innerHTML;
        applySyntax(htmlRaw.value);
        autoSave();
    }

    function syncCodeScroll() { htmlColored.scrollTop = htmlRaw.scrollTop; }
    function exec(cmd, val = null) { document.execCommand(cmd, false, val); syncFromVisual(); }

    // 4. Persistence & Loading
    function autoSave() {
        const data = {
            title: titleInput.value,
            content: htmlRaw.value
        };
        localStorage.setItem('mlgs_current_session', JSON.stringify(data));
    }

    function manualLogTime() {
        const now = new Date().toLocaleString();
        localStorage.setItem('mlgs_last_timestamp', now);
        updateStatusDisplay(now);
    }

    function updateStatusDisplay(time) {
        statusBox.innerText = `LAST SAVED: ${time}`;
        statusBox.classList.add('saved');
    }

    // Save logic stores a Checkpoint specifically
    function downloadHTML() {
        const code = htmlRaw.value;
        const checkpoint = {
            title: titleInput.value,
            content: code,
            time: new Date().toLocaleString()
        };
        localStorage.setItem('mlgs_checkpoint', JSON.stringify(checkpoint));
        
        const blob = new Blob([code], { type: 'text/html' });
        const a = document.createElement('a');
        const filename = (titleInput.value || 'mlgs-email') + '.html';
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        
        manualLogTime();
    }

    // Restore loads the specific Checkpoint (Last Download)
    function restoreCheckpoint() {
        const saved = localStorage.getItem('mlgs_checkpoint');
        if (saved) {
            const data = JSON.parse(saved);
            titleInput.value = data.title;
            htmlRaw.value = data.content;
            syncFromCode();
            alert("Restored version from last 'Save & Download' action.");
        } else {
            alert("No download checkpoint found.");
        }
    }

    function copyHTML() {
        htmlRaw.select();
        document.execCommand('copy');
        alert("HTML Copied!");
    }

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            htmlRaw.value = event.target.result;
            titleInput.value = file.name.replace('.html', '');
            syncFromCode();
        };
        reader.readAsText(file);
    };

    window.onload = () => {
        const session = localStorage.getItem('mlgs_current_session');
        if (session) {
            const data = JSON.parse(session);
            titleInput.value = data.title || "";
            htmlRaw.value = data.content || "";
            syncFromCode();
        }
        const lastTime = localStorage.getItem('mlgs_last_timestamp');
        if (lastTime) updateStatusDisplay(lastTime);
    };

    titleInput.addEventListener('input', autoSave);
</script>

</body>
</html>
