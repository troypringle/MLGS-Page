<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLGS Content Hub - Pro Sync</title>
    <style>
        :root {
            --pro-blue: #0056b3;
            --pro-blue-hover: #004494;
            --pro-green: #28a745;
            --pro-green-hover: #218838;
            --bg-page: #f4f7f9;
            --border: #ced4da;
            /* Notepad++ Light Theme Syntax Colors */
            --syn-tag: #0000ff;
            --syn-attr: #ff0000;
            --syn-val: #8000ff;
            --syn-token: #d63384;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            padding: 25px; /* Minimum 20px padding around layout */
            color: #333;
        }

        .main-hub {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        /* Header & Status Section */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--pro-blue);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            color: var(--pro-blue);
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 26px; /* Larger text for noticeability */
            font-weight: 900;
            padding: 12px 30px;
            border-radius: 8px;
            background: #fff5f5;
            color: #d9534f;
            border: 2px solid #f5c6cb;
            transition: 0.3s ease-in-out;
        }

        .status-badge.saved {
            background: #eafff0;
            color: var(--pro-green);
            border-color: #c3e6cb;
        }

        /* Subject Box - Bitwarden Protection */
        .subject-row {
            margin-bottom: 25px;
        }

        #mlgs-doc-title-input {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #fdfdfd;
            outline-color: var(--pro-blue);
        }

        /* Workspace Grid: Visual (Left) | HTML (Right) */
        .workspace {
            display: flex;
            gap: 25px;
            height: 650px;
            margin-bottom: 25px;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .pane-header {
            background: var(--pro-blue);
            color: white;
            padding: 12px 18px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* Visual Pane Styles */
        .wysiwyg-toolbar {
            background: #f8f9fa;
            border-bottom: 1px solid var(--border);
            padding: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .wysiwyg-toolbar button, .wysiwyg-toolbar select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .wysiwyg-toolbar input[type="color"] {
            width: 38px; height: 38px; border: none; cursor: pointer; background: none;
        }

        #visual-view {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            outline: none;
            background: white;
            font-size: 16px;
        }

        /* HTML Pane Styles (Notepad++ Highlighting) */
        .code-container {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        #html-raw, #html-colored {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            margin: 0; padding: 20px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-sizing: border-box;
            border: none;
            overflow-y: auto;
        }

        #html-raw {
            color: transparent;
            background: transparent;
            caret-color: black;
            z-index: 2;
            resize: none;
            outline: none;
        }

        #html-colored {
            z-index: 1;
            color: #333;
            pointer-events: none;
        }

        /* Syntax Highlight Tokens */
        .tag { color: var(--syn-tag); font-weight: bold; }
        .attr { color: var(--syn-attr); }
        .val { color: var(--syn-val); }
        .mlgs-var { color: white; background: var(--syn-token); padding: 0 3px; border-radius: 3px; font-weight: bold; }

        /* Button Groups */
        .action-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-green { background: var(--pro-green); color: white; }
        .btn-blue { background: var(--pro-blue); color: white; }
        .btn-grey { background: #6c757d; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Footer Section */
        footer {
            border-top: 2px solid #eee;
            padding-top: 30px;
            display: flex;
            gap: 20px;
        }

        .btn-footer {
            flex: 1;
            padding: 25px;
            font-size: 26px;
            font-weight: 900;
        }
    </style>
</head>
<body>

<div class="main-hub">
    <header>
        <h1>MLGS Content Hub</h1>
        <div id="save-status-box" class="status-badge">LAST SAVED: NEVER</div>
    </header>

    <div class="subject-row">
        <!-- autocomplete="off" and unique ID prevents Bitwarden interference -->
        <input type="text" id="mlgs-doc-title-input" 
               placeholder="Subject Line / Email Title..." 
               autocomplete="off" 
               data-lpignore="true">
    </div>

    <div class="workspace">
        <!-- LEFT: VISUAL EDITOR (PREVIEW) -->
        <div class="pane">
            <div class="pane-header">Visual Preview & Editor</div>
            <div class="wysiwyg-toolbar">
                <button onclick="exec('bold')">B</button>
                <button onclick="exec('italic')">I</button>
                <button onclick="exec('underline')">U</button>
                <select onchange="exec('fontSize', this.value); this.selectedIndex=0;">
                    <option value="">Size</option>
                    <option value="3">Small</option>
                    <option value="4">Normal</option>
                    <option value="5">Large</option>
                    <option value="7">Huge</option>
                </select>
                <input type="color" oninput="exec('foreColor', this.value)" title="Text Color">
                <button onclick="exec('createLink', prompt('Enter URL:'))">Link</button>
                <button onclick="exec('insertImage', prompt('Image URL:'))">Img</button>
                <button onclick="exec('removeFormat')">Clear Style</button>
            </div>
            <div id="visual-view" contenteditable="true" 
                 oninput="syncFromVisual()" 
                 onmouseup="syncSelectionToCode()" 
                 onkeyup="syncSelectionToCode()">
            </div>
        </div>

        <!-- RIGHT: HTML CODE (NOTEPAD++ STYLE) -->
        <div class="pane">
            <div class="pane-header">HTML Source Code</div>
            <div class="code-container">
                <div id="html-colored"></div>
                <textarea id="html-raw" spellcheck="false" oninput="syncFromCode()" onscroll="syncCodeScroll()"></textarea>
            </div>
        </div>
    </div>

    <!-- Main Action Bar -->
    <div class="action-bar">
        <button class="btn btn-green" onclick="downloadHTML()">Save & Download File</button>
        <button class="btn btn-blue" onclick="document.getElementById('file-input').click()">Load Last File</button>
        <button class="btn btn-grey" onclick="copyHTML()">Copy HTML Source</button>
    </div>

    <input type="file" id="file-input" style="display:none" accept=".html">

    <!-- Footer Controls -->
    <footer>
        <a href="https://www.myleadgenserect.com/login" target="_blank" class="btn btn-green btn-footer">OPEN MLGS LOGIN</a>
        <button class="btn btn-blue btn-footer" onclick="manualLogTime()">UPDATE TIME / DATE</button>
    </footer>
</div>

<script>
    const visualView = document.getElementById('visual-view');
    const htmlRaw = document.getElementById('html-raw');
    const htmlColored = document.getElementById('html-colored');
    const titleInput = document.getElementById('mlgs-doc-title-input');
    const statusBox = document.getElementById('save-status-box');
    const fileInput = document.getElementById('file-input');

    // 1. Selection Sync: When you highlight on left, the right highlights code
    function syncSelectionToCode() {
        const selection = window.getSelection();
        const selectedText = selection.toString().trim();
        
        if (selectedText.length > 2) {
            const code = htmlRaw.value;
            const index = code.indexOf(selectedText);
            
            if (index !== -1) {
                htmlRaw.focus();
                htmlRaw.setSelectionRange(index, index + selectedText.length);
                
                // Scroll to view
                const linesBefore = code.substr(0, index).split("\n").length;
                htmlRaw.scrollTop = (linesBefore - 5) * 22; 
            }
        }
        autoSave();
    }

    // 2. Syntax Highlighting Engine
    function applySyntax(code) {
        let escaped = code
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // Highlights HTML Tags and Attributes
        escaped = escaped.replace(/&lt;(\/?[a-z1-6]+)(.*?)&gt;/gi, (match, tag, attrs) => {
            let highlightedAttrs = attrs.replace(/([a-z-]+)=(['"].*?['"])/gi, 
                '<span class="attr">$1</span>=<span class="val">$2</span>');
            return `<span class="tag">&lt;${tag}</span>${highlightedAttrs}<span class="tag">&gt;</span>`;
        });

        // Highlights MLGS Variables {!token}
        escaped = escaped.replace(/\{!(.*?)\}/g, '<span class="mlgs-var">{!$1}</span>');

        htmlColored.innerHTML = escaped + "\n";
    }

    // 3. Sync Functions
    function syncFromCode() {
        const code = htmlRaw.value;
        applySyntax(code);
        visualView.innerHTML = code;
        autoSave();
    }

    function syncFromVisual() {
        const code = visualView.innerHTML;
        htmlRaw.value = code;
        applySyntax(code);
        autoSave();
    }

    function syncCodeScroll() {
        htmlColored.scrollTop = htmlRaw.scrollTop;
    }

    function exec(cmd, val = null) {
        document.execCommand(cmd, false, val);
        syncFromVisual();
    }

    // 4. Persistence & Logging
    function autoSave() {
        const data = {
            title: titleInput.value,
            content: htmlRaw.value,
            time: localStorage.getItem('mlgs_saved_at') || "NEVER"
        };
        localStorage.setItem('mlgs_vault', JSON.stringify(data));
    }

    function manualLogTime() {
        const now = new Date().toLocaleString();
        localStorage.setItem('mlgs_saved_at', now);
        updateStatusDisplay(now);
        autoSave();
    }

    function updateStatusDisplay(time) {
        statusBox.innerText = `LAST SAVED: ${time}`;
        statusBox.classList.add('saved');
    }

    function downloadHTML() {
        const blob = new Blob([htmlRaw.value], { type: 'text/html' });
        const a = document.createElement('a');
        const filename = (titleInput.value || 'mlgs-email') + '.html';
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        manualLogTime();
    }

    function copyHTML() {
        htmlRaw.select();
        document.execCommand('copy');
        alert("HTML Source Copied to Clipboard!");
    }

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            htmlRaw.value = event.target.result;
            titleInput.value = file.name.replace('.html', '');
            syncFromCode();
        };
        reader.readAsText(file);
    };

    // 5. App Load
    window.onload = () => {
        const saved = localStorage.getItem('mlgs_vault');
        if (saved) {
            const data = JSON.parse(saved);
            titleInput.value = data.title || "";
            htmlRaw.value = data.content || "";
            syncFromCode();
            const lastTime = localStorage.getItem('mlgs_saved_at');
            if (lastTime) updateStatusDisplay(lastTime);
        }
    };

    titleInput.addEventListener('input', autoSave);
</script>

</body>
</html>
